<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>モンスターの ごはんタイム</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e2a637">

<!-- iOS "Add to Home Screen" support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="モンスターごはん">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<link rel="icon" href="icons/icon-192.png">

<style>
  :root{
    --red:#c0392b;
    --mustard:#e2a637;
    --cream:#fff8ea;
    --ink:#7a2e1a;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    margin:0; padding:0; height:100%; overflow:hidden;
    font-family: "Comic Sans MS","Rounded Mplus 1c","Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;
    touch-action:none;
    user-select:none;
    background: linear-gradient(180deg,#ffedc2 0%, #ffcf8a 55%, #ff9f66 100%);
  }
  #app{ position:relative; width:100%; height:100%; overflow:hidden; }
  .screen{
    display:none; position:absolute; inset:0; flex-direction:column; overflow:hidden;
    padding-top:env(safe-area-inset-top, 0px);
    padding-bottom:env(safe-area-inset-bottom, 0px);
  }
  .screen.active{ display:flex; }
  .screen.shake{ animation:screenShake .4s ease; }
  @keyframes screenShake{
    0%,100%{ transform:translate(0,0); }
    20%{ transform:translate(-10px,4px); }
    40%{ transform:translate(8px,-4px); }
    60%{ transform:translate(-6px,3px); }
    80%{ transform:translate(6px,-2px); }
  }

  img{ -webkit-user-drag:none; user-drag:none; }
  img.img-missing{
    background:repeating-linear-gradient(45deg,#f2e2c4,#f2e2c4 8px,#e6cfa0 8px,#e6cfa0 16px);
    border-radius:10px;
  }

  /* ---------------- shared top bar / title ---------------- */
  .topbar{ flex:0 0 auto; display:flex; align-items:center; justify-content:space-between; padding:8px 10px 0; z-index:60; }
  .small-btn{
    border:none; border-radius:22px; font-family:inherit; font-weight:bold; color:#fff;
    padding:8px 16px; font-size:clamp(12px,3.2vw,16px);
    box-shadow:0 4px 0 rgba(0,0,0,.2); cursor:pointer;
  }
  .small-btn:active{ box-shadow:0 1px 0 rgba(0,0,0,.2); transform:translateY(3px); }
  .btn-back{ background:linear-gradient(180deg,#b7b7c9,#767695); }
  #title{ text-align:center; font-size:clamp(14px,3.6vw,20px); color:var(--ink); padding:2px 6px 0; font-weight:bold; flex:0 0 auto; }

  /* ---------------- sticker progress badge (shared) ---------------- */
  .sticker-progress{
    display:flex; align-items:center; gap:6px; font-size:clamp(10px,2.6vw,13px); font-weight:bold;
    color:var(--ink); background:rgba(255,255,255,.6); border-radius:16px; padding:5px 10px;
    box-shadow:0 2px 0 rgba(0,0,0,.1); white-space:nowrap;
  }
  .sticker-progress .dots{ display:flex; gap:3px; }
  .sticker-progress .dot{ width:9px; height:9px; border-radius:50%; background:rgba(122,46,26,.22); flex:0 0 auto; }
  .sticker-progress .dot.filled{ background:var(--mustard); box-shadow:0 0 0 1px rgba(122,46,26,.3); }

  /* ---------------- speech bubble (shared) ---------------- */
  .speech-bubble{
    position:relative; flex:0 0 auto; background:var(--cream); border:4px solid var(--red); border-radius:24px;
    padding:clamp(6px,1.4vh,12px) clamp(12px,3vw,20px);
    font-size:clamp(12px,3vw,17px); color:var(--ink); font-weight:bold; text-align:center; line-height:1.3;
    box-shadow:0 6px 0 rgba(0,0,0,.10); max-width:90vw; z-index:25; transition:transform .25s ease;
  }
  .speech-bubble::after{
    content:""; position:absolute; bottom:-15px; left:50%; transform:translateX(-50%);
    border-width:15px 11px 0 11px; border-style:solid; border-color:var(--red) transparent transparent transparent;
  }
  .speech-bubble::before{
    content:""; position:absolute; bottom:-9px; left:50%; transform:translateX(-50%);
    border-width:10px 7px 0 7px; border-style:solid; border-color:var(--cream) transparent transparent transparent; z-index:1;
  }
  .speech-bubble .num{ color:var(--red); font-size:1.25em; }

  /* ---------------- overlays (shared) ---------------- */
  #stars-layer{ position:fixed; inset:0; pointer-events:none; z-index:150; }
  .star{ position:absolute; left:50%; top:30%; font-size:clamp(18px,4.5vw,30px); opacity:0; animation:starFly .9s ease-out forwards; }
  @keyframes starFly{
    0%{ opacity:1; transform:translate(-50%,-50%) scale(.3) rotate(0deg); }
    70%{ opacity:1; }
    100%{ opacity:0; transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.3) rotate(var(--rot)); }
  }
  #popup-layer{ position:fixed; inset:0; pointer-events:none; z-index:200; }
  .num-pop{
    position:absolute; font-size:clamp(50px,18vw,120px); font-weight:bold; color:var(--red);
    -webkit-text-stroke:3px #7a1a10; text-shadow:0 6px 0 rgba(0,0,0,.2);
    animation:popNum .8s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  .num-pop.minus{ color:#4b2fa0; -webkit-text-stroke:3px #2b1a5e; }
  @keyframes popNum{
    0%{ transform:translate(-50%,-50%) scale(0) rotate(-10deg); opacity:0; }
    35%{ transform:translate(-50%,-50%) scale(1.25) rotate(4deg); opacity:1; }
    60%{ transform:translate(-50%,-50%) scale(1) rotate(0deg); opacity:1; }
    100%{ transform:translate(-50%,-50%) scale(1.05) translateY(-40px); opacity:0; }
  }
  .sfx-pop{ position:absolute; display:flex; align-items:center; justify-content:center; animation:sfxPop .75s cubic-bezier(.34,1.56,.64,1) forwards; }
  .sfx-burst{
    position:absolute; width:clamp(70px,20vw,120px); height:clamp(70px,20vw,120px);
    background:var(--mustard);
    clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
    opacity:.92;
  }
  .sfx-text{ position:relative; font-size:clamp(14px,3.6vw,20px); font-weight:bold; color:#7a1a10; text-shadow:1px 1px 0 #fff; white-space:nowrap; }
  @keyframes sfxPop{
    0%{ transform:scale(0) rotate(-8deg); opacity:0; }
    40%{ transform:scale(1.1) rotate(4deg); opacity:1; }
    100%{ transform:scale(1) rotate(0deg) translateY(-30px); opacity:0; }
  }

  .result-mark{
    position:fixed; left:50%; top:36%; transform:translate(-50%,-50%) scale(0);
    font-size:clamp(120px,40vw,260px); font-weight:900; line-height:1;
    pointer-events:none; z-index:250;
    animation:resultMarkPop .7s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  .result-mark.correct{ color:#e63946; -webkit-text-stroke:8px #fff; filter:drop-shadow(0 6px 4px rgba(0,0,0,.25)); }
  .result-mark.wrong{ color:#2b6fce; -webkit-text-stroke:8px #fff; filter:drop-shadow(0 6px 4px rgba(0,0,0,.25)); }
  @keyframes resultMarkPop{
    0%{ transform:translate(-50%,-50%) scale(0) rotate(-15deg); opacity:0; }
    45%{ transform:translate(-50%,-50%) scale(1.15) rotate(5deg); opacity:1; }
    70%{ transform:translate(-50%,-50%) scale(1) rotate(0deg); opacity:1; }
    100%{ transform:translate(-50%,-50%) scale(1) rotate(0deg); opacity:0; }
  }

  /* ================= MENU (picture-book forest theme) ================= */
  #screen-menu{
    align-items:center; justify-content:flex-start; overflow:hidden;
    gap:clamp(10px,2.4vh,18px); padding:calc(env(safe-area-inset-top,0px) + 18px) 18px 14px;
    background-image:url('assets/images/haikei.png'); background-size:cover; background-position:center;
  }
  #menu-title-wrap{ position:relative; width:100%; max-width:380px; flex:0 0 auto; }
  #menu-title-img{ display:block; width:100%; height:auto; }
  #home-cards{
    position:relative; z-index:1; flex:1 1 auto; width:100%; max-width:400px;
    display:flex; flex-direction:column; justify-content:center; gap:clamp(10px,2vh,16px); min-height:0;
  }
  .home-card{
    position:relative; border:none; cursor:pointer; font-family:inherit;
    display:flex; align-items:center; gap:clamp(12px,3.2vw,18px); padding:clamp(8px,1.6vh,12px) clamp(14px,3.6vw,20px);
    border-radius:50px; background:#fff8ea;
    box-shadow:0 6px 0 rgba(0,0,0,.15), 0 8px 12px rgba(0,0,0,.14);
    flex:0 0 auto;
  }
  .home-card:active{ box-shadow:0 2px 0 rgba(0,0,0,.15); transform:translateY(4px); }
  .home-card-image:active{ box-shadow:none; }
  .home-card.bounce{ animation:cardPoyon .5s cubic-bezier(.34,1.56,.64,1); }
  @keyframes cardPoyon{
    0%{ transform:scale(1); }
    30%{ transform:scale(.9,1.16); }
    55%{ transform:scale(1.18,.87); }
    78%{ transform:scale(.95,1.06); }
    100%{ transform:scale(1); }
  }
  .home-card-badge{
    flex:0 0 auto; width:clamp(46px,13vw,64px); height:clamp(46px,13vw,64px); border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:clamp(24px,7vw,34px); line-height:1;
    box-shadow:inset 0 -3px 6px rgba(0,0,0,.14), 0 2px 4px rgba(0,0,0,.18);
  }
  .home-card-label{
    font-size:clamp(14px,4vw,18px); font-weight:900; color:var(--ink); text-align:left; line-height:1.3;
  }
  #btn-count .home-card-badge{ background:#ffb066; }
  #btn-maze .home-card-badge{ background:#6fb3ff; }
  .home-card-image{ background:none; box-shadow:none; padding:0; border-radius:0; width:100%; }
  .home-card-img{ display:block; width:100%; height:auto; }
  #app-version{ position:relative; z-index:1; font-size:11px; color:rgba(255,255,255,.9); text-shadow:0 1px 2px rgba(0,0,0,.4); margin-top:2px; flex:0 0 auto; }

  /* shared pill-button style, used by the difficulty-select and puzzle-mode screens */
  .menu-btn{
    width:min(88vw,460px); padding:clamp(14px,3.2vh,22px) 20px; border:none; border-radius:26px;
    font-family:inherit; font-weight:bold; font-size:clamp(15px,4.2vw,22px); color:#fff; text-align:center;
    box-shadow:0 8px 0 rgba(0,0,0,.25); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:12px;
  }
  .menu-btn .emoji{ font-size:1.4em; }
  .menu-btn:active{ box-shadow:0 3px 0 rgba(0,0,0,.25); transform:translateY(5px); }

  /* ================= GAME 1: counting (conveyor + crow) ================= */
  .remaining-badge{
    flex:0 0 auto; align-self:center; display:flex; align-items:baseline; gap:4px;
    background:rgba(255,255,255,.8); border:3px solid var(--red); border-radius:22px;
    padding:1px 16px; margin-top:2px; box-shadow:0 3px 0 rgba(0,0,0,.15);
  }
  .remaining-badge .remaining-label{ font-size:clamp(11px,2.8vw,14px); font-weight:bold; color:var(--ink); }
  .remaining-badge .remaining-num{ font-size:clamp(30px,9vw,48px); font-weight:900; color:var(--red); line-height:1.1; }
  .remaining-badge .remaining-unit{ font-size:clamp(13px,3.2vw,16px); font-weight:bold; color:var(--ink); }
  .remaining-badge.pulse{ animation:remainingPulse .4s ease; }
  @keyframes remainingPulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.18); } }
  #screen-count .body-area{ flex:1 1 auto; position:relative; display:flex; flex-direction:column; min-height:0; }
  .monster-area1{ position:relative; flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:2px; padding-top:2px; }
  .monster-img{ width:clamp(120px,32vw,190px); height:auto; object-fit:contain; }
  .monster-img.small{ width:clamp(90px,22vw,130px); }
  #plateArea1{ position:relative; width:clamp(140px,40vw,210px); margin-top:-14px; }
  .plate-disc{ width:100%; height:clamp(30px,9vw,44px); background:linear-gradient(180deg,#dfe8f5,#aebedc); border-radius:50%; box-shadow:0 6px 0 rgba(0,0,0,.15), inset 0 -4px 0 rgba(0,0,0,.1); }
  #plateIcons1{ position:absolute; left:0; right:0; bottom:60%; display:flex; justify-content:center; gap:-6px; flex-wrap:wrap; }
  .plate-icon{ width:clamp(24px,7vw,36px); height:auto; margin-left:-6px; filter:drop-shadow(0 2px 2px rgba(0,0,0,.25)); }

  .belt-wrap{ position:relative; flex:0 0 auto; height:clamp(120px,28vh,180px); overflow:hidden; }
  .belt-line{
    position:absolute; left:0; right:0; bottom:18%; height:16px;
    background:repeating-linear-gradient(90deg,#5a4a3a 0 24px,#3d3226 24px 48px);
    background-size:48px 100%;
    animation:beltMove 1s linear infinite;
    box-shadow:0 4px 0 rgba(0,0,0,.2);
  }
  @keyframes beltMove{ from{ background-position:0 0; } to{ background-position:48px 0; } }
  #beltItems{ position:absolute; inset:0; }
  .belt-item{
    position:absolute; width:clamp(56px,15vw,86px); height:auto; touch-action:none; cursor:grab; will-change:transform;
    filter:drop-shadow(0 4px 4px rgba(0,0,0,.25));
  }
  .belt-item.dragging{ cursor:grabbing; z-index:80; filter:drop-shadow(0 8px 6px rgba(0,0,0,.35)); }
  .belt-item-bomb{ animation:bombPulse .5s ease-in-out infinite; }
  @keyframes bombPulse{
    0%,100%{ filter:drop-shadow(0 4px 4px rgba(0,0,0,.25)) brightness(1); }
    50%{ filter:drop-shadow(0 4px 10px rgba(255,60,0,.7)) brightness(1.18); }
  }

  .crow{ position:fixed; top:0; left:0; width:64px; height:50px; z-index:120; pointer-events:none; }
  .crow-body{ position:absolute; left:18%; top:20%; width:64%; height:60%; background:#2b2b30; border-radius:50% 50% 40% 40%; }
  .crow-body::after{ content:""; position:absolute; right:-16%; top:30%; width:0; height:0; border-top:7px solid transparent; border-bottom:7px solid transparent; border-left:14px solid #e2a637; }
  .crow-eye{ position:absolute; left:62%; top:32%; width:14%; height:14%; background:#fff; border-radius:50%; }
  .crow-wing{ position:absolute; top:22%; width:40%; height:50%; background:#1c1c20; border-radius:50% 60% 10% 50%; animation:wingFlap .22s ease-in-out infinite alternate; }
  .crow-wing.left{ left:0%; transform-origin:100% 30%; }
  .crow-wing.right{ right:0%; transform-origin:0% 30%; transform:scaleX(-1); }
  @keyframes wingFlap{ from{ transform:rotate(-8deg); } to{ transform:rotate(24deg); } }
  .crow-wing.right{ animation-name:wingFlapR; }
  @keyframes wingFlapR{ from{ transform:scaleX(-1) rotate(-8deg); } to{ transform:scaleX(-1) rotate(24deg); } }
  .crow-loot{
    position:absolute; left:8%; top:58%; width:52%; height:52%; object-fit:contain;
    filter:drop-shadow(0 3px 2px rgba(0,0,0,.35)); animation:lootDangle .3s ease-in-out infinite alternate;
  }
  @keyframes lootDangle{ from{ transform:rotate(-6deg) translateY(0); } to{ transform:rotate(6deg) translateY(2px); } }

  @keyframes dekitaPulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.07); } }

  .drag-inner{ position:relative; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; animation:bob 2.3s ease-in-out infinite; }
  .dragging .drag-inner{ animation:none; }
  .drag-inner.rejected{ animation:shake .4s ease; }
  @keyframes bob{ 0%,100%{ transform:translateY(0) rotate(0deg); } 50%{ transform:translateY(-8%) rotate(-2deg); } }
  @keyframes shake{ 0%,100%{ transform:translateX(0); } 25%{ transform:translateX(-7px); } 75%{ transform:translateX(7px); } }

  .monster-turn-away{ animation:turnAway 1.1s ease; }
  @keyframes turnAway{
    0%{ transform:scaleX(1) rotate(0deg); }
    30%{ transform:scaleX(-1) rotate(-6deg); }
    100%{ transform:scaleX(-1) rotate(-6deg); }
  }

  /* ================= SEAL ALBUM ================= */
  #seal-board-wrap{ flex:1 1 auto; overflow-y:auto; padding:6px 10px 14px; }
  #seal-board{
    display:grid; grid-template-columns:repeat(5,1fr); gap:8px;
    background-size:cover; background-position:center; border-radius:16px; padding:10px;
  }
  .seal-cell{ position:relative; aspect-ratio:1; cursor:pointer; }
  .seal-cell.locked{ background:rgba(255,255,255,.4); border-radius:16%; }
  .seal-cell.locked img{ width:100%; height:100%; object-fit:contain; opacity:.28; filter:grayscale(85%); padding:10%; box-sizing:border-box; }

  /* ---- Bikkuriman-style holographic prism sticker card ---- */
  .sticker-card{
    position:relative; width:100%; height:100%; border-radius:16%; padding:8%; overflow:hidden;
    background:conic-gradient(from 0deg, #ff9a9e, #fbc2eb, #a18cd1, #8fd3f4, #a1ffce, #fcf6ba, #ff9a9e);
    box-shadow:0 0 0 2px #fff, 0 0 0 4px #d4af37, 0 3px 6px rgba(0,0,0,.35);
  }
  .sticker-card img{ position:relative; width:100%; height:100%; object-fit:contain; border-radius:10%; background:#fff8ea; display:block; }
  .sticker-card::before{
    content:""; position:absolute; inset:0; z-index:2;
    background:linear-gradient(115deg, transparent 25%, rgba(255,255,255,.9) 45%, rgba(255,255,255,.9) 55%, transparent 75%);
    background-size:250% 250%; background-position:200% 200%;
    mix-blend-mode:overlay; pointer-events:none;
    animation:foilShine 3.2s ease-in-out infinite;
  }
  @keyframes foilShine{
    0%{ background-position:200% 200%; }
    50%{ background-position:-30% -30%; }
    100%{ background-position:200% 200%; }
  }

  /* ---- sticker "get!" fullscreen reveal ---- */
  #stickerReveal{
    position:fixed; inset:0; z-index:300;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
    background:rgba(60,20,10,.7);
    opacity:0; pointer-events:none; transition:opacity .3s ease;
  }
  #stickerReveal.show{ opacity:1; pointer-events:auto; }
  .sticker-reveal-label{
    font-size:clamp(20px,6vw,32px); font-weight:bold; color:#fff;
    text-shadow:0 3px 0 var(--red), 0 0 20px rgba(255,220,120,.8);
    transform:scale(0); transition:transform .4s cubic-bezier(.34,1.56,.64,1);
  }
  #stickerReveal.show .sticker-reveal-label{ transform:scale(1); }
  .sticker-card-big{
    width:min(64vw,260px); height:min(64vw,260px); border-radius:14%; padding:6%;
    transform:scale(0) rotate(-25deg); transition:transform .5s cubic-bezier(.34,1.56,.64,1) .1s;
  }
  #stickerReveal.show .sticker-card-big{ transform:scale(1) rotate(0deg); }
  .sticker-reveal-name{
    font-size:clamp(17px,5.2vw,26px); font-weight:900; color:#fff; text-align:center;
    text-shadow:0 3px 0 var(--red), 0 0 14px rgba(255,220,120,.8);
    letter-spacing:1px; transform:skewX(-6deg);
    opacity:0; transition:opacity .3s ease .4s;
  }
  .sticker-reveal-phrase{
    font-size:clamp(12px,3.6vw,16px); font-weight:bold; color:#fff8ea; text-align:center; max-width:82vw;
    text-shadow:1px 1px 0 rgba(0,0,0,.5); line-height:1.4;
    opacity:0; transition:opacity .3s ease .5s;
  }
  #stickerReveal.show .sticker-reveal-name,
  #stickerReveal.show .sticker-reveal-phrase{ opacity:1; }
  #stickerRevealCloseBtn{
    border:none; border-radius:26px; font-family:inherit; font-weight:bold; color:#fff;
    padding:10px 28px; font-size:clamp(14px,3.6vw,18px);
    background:linear-gradient(180deg,var(--mustard),#a9711c); box-shadow:0 5px 0 #8a5810;
    opacity:0; transition:opacity .3s ease .3s;
  }
  #stickerReveal.show #stickerRevealCloseBtn{ opacity:1; }
  #stickerRevealCloseBtn:active{ box-shadow:0 2px 0 #8a5810; transform:translateY(3px); }

  /* ---- sticker detail view (tap an owned sticker in the album to enlarge it) ---- */
  #stickerDetailView{
    position:fixed; inset:0; z-index:300; padding:20px; box-sizing:border-box;
    display:flex; align-items:center; justify-content:center;
    background:rgba(60,20,10,.55);
    opacity:0; pointer-events:none; transition:opacity .25s ease;
  }
  #stickerDetailView.show{ opacity:1; pointer-events:auto; }
  .sticker-popup-card{
    position:relative; width:min(78vw,320px); max-width:100%; box-sizing:border-box;
    background:var(--cream); border-radius:28px; padding:22px 16px 16px;
    display:flex; flex-direction:column; align-items:center; gap:8px;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
    transform:scale(.6); opacity:0; transition:transform .3s cubic-bezier(.34,1.56,.64,1), opacity .2s ease;
  }
  #stickerDetailView.show .sticker-popup-card{ transform:scale(1); opacity:1; }
  .sticker-popup-card .sticker-card-big{ width:min(50vw,190px); height:min(50vw,190px); transform:none; }
  .sticker-popup-card .sticker-reveal-name{
    color:var(--ink); text-shadow:none; transform:none; opacity:1; letter-spacing:.5px;
  }
  .sticker-popup-card .sticker-reveal-phrase{
    color:var(--ink); text-shadow:none; opacity:1; max-width:100%;
  }
  #stickerDetailCloseBtn{
    position:absolute; top:-14px; right:-10px;
    width:36px; height:36px; border-radius:50%; border:3px solid #fff; padding:0;
    background:var(--red); color:#fff; font-size:19px; font-weight:bold; line-height:1;

  .puzzle-piece{ position:absolute; inset:0; width:100%; height:100%; cursor:grab; touch-action:none; }

  /* ================= GAME 5: めいろ (maze) ================= */
  #screen-maze{
    background-image:url('images/maze_bg.png'); background-size:cover; background-position:center;
  }
  #mazeDifficultySelect{
    flex:1 1 auto; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:clamp(10px,2.6vh,18px); padding:10px;
  }
  #mazeDifficultySelect .menu-btn{ width:min(80vw,360px); }
  .maze-body{
    flex:1 1 auto; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:clamp(8px,1.8vh,14px); min-height:0; padding:6px;
  }
  #mazeBoardWrap{
    position:relative; width:min(84vw,360px); aspect-ratio:1/1;
    /* touch-action:none stops the browser's own scroll/zoom gestures from
       eating the drag; user-select/user-drag stop a mouse-drag on one of the
       cell icons from starting a native "ghost image" drag instead of firing
       our pointermove-based tracing (desktop-mouse only - touch doesn't
       trigger native image drag, so this had no effect on phones). */
    touch-action:none; -webkit-user-select:none; user-select:none;
  }
  #mazeBoardWrap img{ -webkit-user-drag:none; user-drag:none; }
  #mazeBoard{
    position:absolute; inset:0; display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); grid-template-rows:repeat(4,minmax(0,1fr));
    gap:clamp(3px,1vw,6px); border-radius:18px; background:rgba(255,255,255,.5); padding:clamp(4px,1.2vw,8px);
    box-shadow:inset 0 2px 6px rgba(0,0,0,.12), 0 6px 16px rgba(0,0,0,.18);
  }
  .maze-cell{
    position:relative; border-radius:10px; display:flex; align-items:center; justify-content:center;
    font-size:clamp(18px,5.6vw,26px); background-size:cover; background-position:center; overflow:hidden;
  }
  .maze-cell.empty{ background-image:url('images/maze_grass_tile.png'); }
  .maze-cell.path{ background-image:url('images/maze_road_tile.png'); box-shadow:inset 0 0 0 2px rgba(255,255,255,.5); }
  .maze-connector{ position:absolute; background-image:url('images/maze_road_tile.png'); background-size:cover; z-index:1; pointer-events:none; }
  .maze-fence{
    position:absolute; z-index:4; border-radius:3px; pointer-events:none;
    background:repeating-linear-gradient(135deg,#ff8a1f 0,#ff8a1f 6px,#fff 6px,#fff 12px);
    box-shadow:0 1px 3px rgba(0,0,0,.4), inset 0 0 0 1px rgba(0,0,0,.3);
  }
  .maze-fence.v{ width:6px; }
  .maze-fence.h{ height:6px; }
  .maze-cell.goal, .maze-cell.start{ z-index:8; }
  .maze-cell.goal{ box-shadow:inset 0 0 0 5px var(--red); animation:mazePopGlow 1s ease-in-out infinite; --glow-color:192,57,43; }
  .maze-cell.start{ box-shadow:inset 0 0 0 5px #2e9e4f; animation:mazePopGlow 1s ease-in-out infinite; --glow-color:46,158,79; }
  .maze-cell.goal::before, .maze-cell.start::before{
    content:''; position:absolute; inset:6%; border-radius:50%; z-index:-1;
    background:radial-gradient(circle, rgba(255,255,255,.95) 0%, rgba(255,255,255,.55) 55%, rgba(255,255,255,0) 78%);
  }
  @keyframes mazePopGlow{
    0%,100%{ box-shadow:inset 0 0 0 5px rgba(var(--glow-color),1), 0 0 0 rgba(var(--glow-color),0); }
    50%{ box-shadow:inset 0 0 0 7px rgba(var(--glow-color),1), 0 0 28px 8px rgba(var(--glow-color),.9); }
  }
  .maze-cell-label{
    position:absolute; top:2%; left:50%; transform:translateX(-50%); z-index:9;
    font-size:clamp(9px,2.6vw,12px); font-weight:900; color:#fff; -webkit-text-stroke:2px rgba(0,0,0,.35);
    white-space:nowrap; line-height:1.4;
  }
  .maze-cell.goal .maze-cell-label, .maze-cell.start .maze-cell-label{
    /* Contained INSIDE the cell's own box (not a negative top like the
       default label) - a bigger pill that spills upward would cover
       whatever gimmick sits in the row above instead of just this cell. */
    font-size:clamp(10px,3vw,13px); top:2%; padding:1px 8px; border-radius:999px;
    box-shadow:0 2px 6px rgba(0,0,0,.35);
  }
  .maze-cell.goal .maze-cell-label{ color:#fff; background:var(--red); }
  .maze-cell.start .maze-cell-label{ color:#fff; background:#2e9e4f; }
  .maze-gimmick-label{ font-size:clamp(7px,2vw,9px); top:2%; }
  .maze-cell.gimmick-warp .maze-gimmick-label{ color:#d8c6ff; }
  .maze-cell.gimmick-light .maze-gimmick-label{ color:#ffe9b0; }
  .maze-cell.gimmick-switch .maze-gimmick-label{ color:#fff6c9; }
  .maze-cell.gimmick-gate .maze-gimmick-label{ color:#c6e0ff; }
  .maze-cell img.maze-cell-icon{ width:88%; height:88%; object-fit:contain; filter:drop-shadow(0 2px 2px rgba(0,0,0,.3)); }
  .maze-cell.goal img.maze-cell-icon, .maze-cell.start img.maze-cell-icon{
    width:90%; height:90%; animation:mazePopBounce 1s ease-in-out infinite;
  }
  @keyframes mazePopBounce{
    0%,100%{ transform:translateY(0) scale(1); }
    50%{ transform:translateY(-3%) scale(1.06); }
  }
  .maze-effect{
    position:absolute; width:25%; height:25%; z-index:30; pointer-events:none;
    display:flex; align-items:center; justify-content:center; font-size:clamp(28px,9vw,42px);
  }
  .maze-effect.barricade{ animation:mazeEffectCrash .6s ease-out forwards; }
  @keyframes mazeEffectCrash{
    0%{ transform:scale(.3) rotate(0deg); opacity:0; }
    30%{ transform:scale(1.3) rotate(-12deg); opacity:1; }
    60%{ transform:scale(1.05) rotate(8deg); opacity:1; }
    100%{ transform:scale(1.1) rotate(0deg); opacity:0; }
  }
  .maze-effect.puddle{ animation:mazeEffectSplash .7s ease-out forwards; }
  @keyframes mazeEffectSplash{
    0%{ transform:scale(.2) translateY(0); opacity:0; }
    35%{ transform:scale(1.25) translateY(-10px); opacity:1; }
    70%{ transform:scale(1) translateY(2px); opacity:1; }
    100%{ transform:scale(1.05) translateY(6px); opacity:0; }
  }
  .maze-effect.arrest{ animation:mazeEffectArrest .9s ease-in-out forwards; font-size:clamp(24px,8vw,36px); }
  @keyframes mazeEffectArrest{
    0%,100%{ opacity:0; }
    10%,90%{ opacity:1; }
    15%{ transform:scale(1) translateX(0); filter:hue-rotate(0deg); }
    35%{ transform:scale(1.2) translateX(-6px); filter:hue-rotate(0deg) drop-shadow(0 0 8px #e63946); }
    55%{ transform:scale(1.2) translateX(6px); filter:hue-rotate(0deg) drop-shadow(0 0 8px #2c6fce); }
    75%{ transform:scale(1.1) translateX(-4px); filter:hue-rotate(0deg) drop-shadow(0 0 8px #e63946); }
  }
  /* Gimmick cells (warp/light/switch/gate) need their own raised
     z-index, same as start/goal - otherwise the positive z-index connector
     and fence overlays (drawn as later, positively-stacked siblings in
     #mazeBoard) paint on top of them and hide their icon entirely. */
  .maze-cell.gimmick-warp, .maze-cell.gimmick-light,
  .maze-cell.gimmick-switch, .maze-cell.gimmick-gate, .maze-cell.has-icon{
    z-index:5;
  }
  .maze-cell.gimmick-warp{ box-shadow:inset 0 0 0 3px #7a4fd6, 0 0 10px 2px rgba(122,79,214,.7); }
  .maze-cell.gimmick-light{ box-shadow:inset 0 0 0 3px #e2a637, 0 0 10px 2px rgba(226,166,55,.7); }
  .maze-cell.gimmick-switch{ box-shadow:inset 0 0 0 3px #f4d13d, 0 0 10px 2px rgba(244,209,61,.7); }
  .maze-cell.gimmick-gate{ box-shadow:inset 0 0 0 3px #2c6fce, 0 0 10px 2px rgba(44,111,206,.7); }
  .maze-cell.gimmick-warp img.maze-cell-icon, .maze-cell.gimmick-light img.maze-cell-icon,
  .maze-cell.gimmick-switch img.maze-cell-icon,
  .maze-cell.gimmick-gate img.maze-cell-icon{

  }
  .maze-cell.gimmick-warp.warp-b img.maze-cell-icon{ filter:hue-rotate(140deg); }
  #mazeCar.spin{ animation:mazeCarSpin .55s ease-in-out; }
  @keyframes mazeCarSpin{
    0%{ transform:rotate(0deg) scale(1); }
    50%{ transform:rotate(200deg) scale(1.2); }

  #mazeCar{

<script>
(function(){

  /* ===================== disable native image drag/right-click menu =====================
     On desktop browsers, holding the mouse down on an <img> and moving it starts the
     browser's own native drag-and-drop (ghost image) gesture, which swallows the
     pointermove events our custom drag logic relies on - left-click "doesn't work" as a
     result, while right-click (which never triggers native image drag) does, but then
     pops the context menu instead. Disabling both makes left-click dragging work normally. */
  document.addEventListener('dragstart', function(e){
    if(e.target && e.target.tagName === 'IMG'){ e.preventDefault(); }
  });
  document.addEventListener('contextmenu', function(e){

  });

    {name:'くろやみせんおう', phrase:'よるの まちを こっそり まもってあげるぞ！'},
    {name:'ちびとかげ', phrase:'ちいさな しっぽを ゆらゆら ふるよ！'},
    {name:'はりゅうドラゴ', phrase:'ちいさな つばさで ふわっと とぶよ！'},
    {name:'こうりゅうおう', phrase:'おおきな つばさと ほのおで そらを まうぞ！'},

    {name:'ふわふくろう', phrase:'まんまるめで ふしぎな ゆめを みせるよ！'},
    {name:'テレパフクロウ', phrase:'こころの こえを きいて おてつだいするよ！'},
    {name:'だいけんじゃおう', phrase:'ふしぎな ちからで みんなを みちびくぞ！'},
    {name:'ぷにけろ', phrase:'ぷにぷに ほっぺで ケロケロ なくよ！'},
    {name:'ぶくぶくケロン', phrase:'あわあわ バブルで みずたまり あそびだよ！'},
    {name:'あわあわキングケロ', phrase:'おおきな あわで みんなを ふわふわ うかせるぞ！'},
    {name:'ふわりす', phrase:'ふわふわ しっぽで かぜに のるよ！'},
    {name:'そよかぜリス', phrase:'どんぐりを もって かぜと いっしょに はしるよ！'},
    {name:'だいふうしんおう', phrase:'おおきな かぜで みんなを すずしく するぞ！'},
    {name:'ほしいぬ', phrase:'きらきら ほしぞらの したで ねむるよ！'},
    {name:'せいざおおかみ', phrase:'ほしの ちからで よるぞらを かがやかせるぞ！'}
  ];

  /* ===================== localStorage state ===================== */
  var STORAGE_KEY = 'monsterCafeStateV1';
  var TOTAL_STICKERS = 50;
  var state = loadState();

  var CORRECT_PER_STICKER = 5;

  function loadState(){
    var defaults = { stickers:[], nextSticker:1, correctStreak:0 };
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        var parsed = JSON.parse(raw);
        return Object.assign(defaults, parsed);
      }
    }catch(e){}
    return defaults;
  }
  function saveState(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
  }
  function awardSticker(){
    if(state.nextSticker <= TOTAL_STICKERS){
      var awarded = state.nextSticker;
      state.stickers.push(awarded);
      state.nextSticker++;
      saveState();
      showStickerGetReveal(awarded);
      return awarded;
    }
    return null;
  }
  function registerCorrect(){
    state.correctStreak++;
    if(state.correctStreak >= CORRECT_PER_STICKER){
      state.correctStreak = 0;
      saveState();
      awardSticker();
    } else {
      saveState();
    }
    renderStickerProgress();
  }
  function renderStickerProgress(){
    var remaining = CORRECT_PER_STICKER - state.correctStreak;
    var dots = '';
    for(var i=0;i<CORRECT_PER_STICKER;i++){
      dots += '<span class="dot'+(i<state.correctStreak?' filled':'')+'"></span>';
    }
    var html = '<span class="dots">'+dots+'</span><span>あと'+remaining+'こでシール！</span>';
    ['stickerProgress1','stickerProgressCar'].forEach(function(id){
      var el = document.getElementById(id);
      if(el) el.innerHTML = html;
    });
  }
  /* ===================== navigation ===================== */
  var screens = document.querySelectorAll('.screen');
  function showScreen(name){
    if(name !== 'guruguru' && window.cleanupGuruguru){ window.cleanupGuruguru(); }
    screens.forEach(function(s){ s.classList.toggle('active', s.id === 'screen-'+name); });
    if(name === 'count'){ resetCountGame(); }
    if(name === 'seal'){ renderSealBoard(); }
    if(name === 'car'){ window.resetCarGame(); }
    if(name === 'guruguru'){ window.resetGuruguruGame(); }
    if(name === 'maze'){ window.resetMazeGame(); }
  }
  function bounceThenNavigate(btn, screenName){
    btn.addEventListener('pointerdown', function(e){
      ensureAudio();
      btn.classList.remove('bounce');
      void btn.offsetWidth; // restart the animation if it's still mid-play from a rapid double-tap
      btn.classList.add('bounce');
      setTimeout(function(){ showScreen(screenName); }, 190);
    });
  }
  bounceThenNavigate(document.getElementById('btn-count'), 'count');
  bounceThenNavigate(document.getElementById('btn-seal'), 'seal');
  bounceThenNavigate(document.getElementById('btn-car'), 'car');
  bounceThenNavigate(document.getElementById('btn-guruguru'), 'guruguru');
  bounceThenNavigate(document.getElementById('btn-maze'), 'maze');
  document.querySelectorAll('[data-nav="menu"]').forEach(function(b){
    b.addEventListener('pointerdown', function(e){ e.stopPropagation(); showScreen('menu'); });
  });
  renderStickerProgress();

  /* ===================== audio (synth, no assets) ===================== */
  var actx = null;
  function ensureAudio(){
    if(!actx){ try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ actx=null; } }
    if(actx && actx.state === 'suspended'){ actx.resume(); }
  }
  function beep(freq, dur, delay, type, vol){
    if(!actx) return;
    delay = delay||0; type = type||'sine'; vol = vol==null?0.18:vol;
    var t0 = actx.currentTime + delay;
    var osc = actx.createOscillator();
    var gain = actx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(vol, t0+0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    osc.connect(gain).connect(actx.destination);
    osc.start(t0); osc.stop(t0+dur+0.02);

  /* ===================== shared shatter/reassemble fx =====================
     Splits imgSrc into N pie-slice pieces (same geometric approach as the
     car game's shake puzzle) inside containerEl (must be position:relative
     and already showing the resolved image behind it), shatters them apart
     with a "pariin" sound, then automatically gathers them back together
     with a bouncy easing before calling onComplete(). Non-interactive - this
     is a celebratory transition effect, not a drag puzzle. */
  function playShatterReassemble(containerEl, imgSrc, onComplete){
    var pieceCount = [6,8,10][Math.floor(Math.random()*3)];
    var wrap = document.createElement('div');
    wrap.className = 'shatter-wrap';
    containerEl.appendChild(wrap);

    var base = 360/pieceCount, jitter = base*0.45;
    var angles = [];
    for(var i=0;i<pieceCount;i++){ angles.push(i*base + (Math.random()*2-1)*jitter); }
    function pieceClipPath(i){
      var startDeg = angles[i], endDeg = (i<pieceCount-1) ? angles[i+1] : angles[0]+360;
      function pt(deg){
        var rad = deg*Math.PI/180;
        return (50+150*Math.cos(rad)).toFixed(1)+'% '+(50+150*Math.sin(rad)).toFixed(1)+'%';
      }
      return 'polygon(50% 50%, '+pt(startDeg)+', '+pt(endDeg)+')';
    }

    var pieces = [];
    for(var i=0;i<pieceCount;i++){
      var el = document.createElement('div');
      el.className = 'shatter-piece';
      el.style.clipPath = pieceClipPath(i);
      var img = document.createElement('img');
      img.src = imgSrc;
      img.alt = '';
      el.appendChild(img);
      wrap.appendChild(el);
      pieces.push(el);
    }

    ensureAudio();
    playShatterSound();
    var screenEl = containerEl.closest ? containerEl.closest('.screen') : null;
    if(screenEl) shakeScreen(screenEl);

    // shatter outward
    requestAnimationFrame(function(){
      pieces.forEach(function(el){
        var angle = Math.random()*Math.PI*2, dist = 55 + Math.random()*70;
        var x = Math.cos(angle)*dist, y = Math.sin(angle)*dist + 15;
        var rot = Math.random()*140 - 70;
        el.style.transition = 'transform .45s cubic-bezier(.34,1.56,.64,1)';
        el.style.transform = 'translate('+x+'px,'+y+'px) rotate('+rot+'deg)';
      });
    });

    // gather back together into the complete picture
    setTimeout(function(){
      pieces.forEach(function(el, i){
        el.style.transition = 'transform .5s cubic-bezier(.34,1.56,.64,1) '+(i*0.03)+'s';
        el.style.transform = 'translate(0,0) rotate(0deg)';
      });
      playCatchSound(1);
      spawnStars();
      setTimeout(function(){
        if(wrap.parentNode) wrap.parentNode.removeChild(wrap);
        if(onComplete) onComplete();
      }, 650);
    }, 850);
  }

  /* ===================== generic drag helper =====================
     el must contain a child with class "drag-inner" (idle animation lives there,
     never on el itself, so it doesn't fight with the JS-driven drag transform). */
  function attachDrag(el, targetElGetter, opts){
    var startX=0, startY=0, dragging=false;
    var pad = opts.pad != null ? opts.pad : 0.3;

    el.addEventListener('pointerdown', function(e){
      if(el.dataset.locked) return;
      if(opts.canDrag && !opts.canDrag()) return;
      ensureAudio();
      dragging = true;
      el.classList.add('dragging');
      try{ el.setPointerCapture(e.pointerId); }catch(err){}
      startX = e.clientX; startY = e.clientY;
      el.style.transition = 'none';
      if(opts.onGrab) opts.onGrab(el);
    });
    el.addEventListener('pointermove', function(e){
      if(!dragging) return;
      var dx = e.clientX - startX, dy = e.clientY - startY;
      el.style.transform = 'translate('+dx+'px,'+dy+'px) scale(1.15)';
    });
    function endDrag(){
      if(!dragging) return;
      dragging = false;
      el.classList.remove('dragging');

      var targetEl = targetElGetter();
      var pRect = el.getBoundingClientRect();
      var pCenterX = pRect.left + pRect.width/2;
      var pCenterY = pRect.top + pRect.height/2;
      var tRect = targetEl.getBoundingClientRect();
      var padX = tRect.width * pad;
      var padY = tRect.height * pad * 1.2;
      var hit = pCenterX > tRect.left - padX && pCenterX < tRect.right + padX &&
                pCenterY > tRect.top - padY && pCenterY < tRect.bottom + padY;

      if(hit){
        opts.onDrop(el, tRect);
      } else {
        if(opts.onMiss) opts.onMiss(el);
      }
    }
    el.addEventListener('pointerup', endDrag);
    el.addEventListener('pointercancel', endDrag);
  }
  function bounceHome(el){
    el.style.transition = 'transform .35s cubic-bezier(.34,1.56,.64,1)';
    el.style.transform = 'translate(0,0) scale(1)';
  }
  function rejectShake(el){
    var inner = el.querySelector('.drag-inner');
    inner.classList.add('rejected');
    setTimeout(function(){ inner.classList.remove('rejected'); }, 400);
  }

  (function(){

    var lastTs = null;

    function pxWidth(){ return beltWrap.clientWidth; }

    function updateRemainingDisplay(){

    function spawnBeltItem(){
      if(cleared) return;

      var isBomb = !hasBomb && Math.random() < BOMB_CHANCE;
      var el = document.createElement('img');

      el.style.transform = 'translateX(-100px)';
      beltItems.push(item);
      if(isBomb){ attachBombTouch(item); } else { attachBeltDrag(item); }
    }

    function attachBombTouch(item){
      var el = item.el;
      el.addEventListener('pointerdown', function(e){
        if(cleared || item.exploded) return;
        item.exploded = true;
        ensureAudio();
        try{ el.setPointerCapture(e.pointerId); }catch(err){}

      });

    function explodeBomb(item){

      showResultMark(false);

    }
    function scheduleSpawn(){
      var delay = 1600 + Math.random()*1200;
      spawnTimer = setTimeout(function(){
        if(!cleared){
          if(beltItems.length < 5) spawnBeltItem();
          scheduleSpawn();
        }
      }, delay);
    }

    function attachBeltDrag(item){
      var el = item.el;
      var startX=0, startY=0, dragging=false, baseX=0;
      el.addEventListener('pointerdown', function(e){
        if(cleared) return;
        ensureAudio();
        dragging = true;
        item.held = true;
        el.classList.add('dragging');
        try{ el.setPointerCapture(e.pointerId); }catch(err){}
        startX = e.clientX; startY = e.clientY;
        baseX = item.x;
      });
      el.addEventListener('pointermove', function(e){
        if(!dragging) return;
        var dx = e.clientX - startX, dy = e.clientY - startY;
        item.x = baseX + dx;
        el.style.transform = 'translate('+item.x+'px,'+dy+'px) scale(1.12)';
        el.dataset.dragDy = dy;
      });
      function endDrag(){
        if(!dragging) return;
        dragging = false;
        el.classList.remove('dragging');

        var pRect = el.getBoundingClientRect();
        var pCenterX = pRect.left + pRect.width/2;
        var pCenterY = pRect.top + pRect.height/2;
        // catch zone = monster (mouth) + plate combined, so dropping near either works
        var mRect = monsterImg.getBoundingClientRect();
        var plRect = plateArea.getBoundingClientRect();
        var tLeft = Math.min(mRect.left, plRect.left);
        var tTop = Math.min(mRect.top, plRect.top);
        var tRight = Math.max(mRect.right, plRect.right);
        var tBottom = Math.max(mRect.bottom, plRect.bottom);
        var padX = (tRight-tLeft) * 0.25;
        var padY = (tBottom-tTop) * 0.25;
        var hit = pCenterX > tLeft - padX && pCenterX < tRight + padX &&
                  pCenterY > tTop - padY && pCenterY < tBottom + padY;

        if(hit && !cleared && plateCount < target){
          catchItem(item);
        } else {
          item.held = false;
          el.style.transform = 'translateX('+item.x+'px)';
        }
      }
      el.addEventListener('pointerup', endDrag);
      el.addEventListener('pointercancel', endDrag);
    }

    function removeBeltItem(item){
      var idx = beltItems.indexOf(item);
      if(idx>=0) beltItems.splice(idx,1);
      if(item.el.parentNode) item.el.parentNode.removeChild(item.el);
    }

    function catchItem(item){
      removeBeltItem(item);
      plateCount++;
      playCatchSound(plateCount);
      renderPlateIcons();
      updateRemainingDisplay();
      var r = plateArea.getBoundingClientRect();
      showNumberPopup(plateCount, r.left+r.width/2, window.innerHeight*0.28, false);
      if(plateCount < target){
        flashBubble(orderBubble, 'あと <span class="num">'+(target-plateCount)+'</span>こ！');

      if(plateCount === target){

    function scheduleCrow(){
      var delay = 4200 + Math.random()*2800;
      crowTimer = setTimeout(function(){
        if(!cleared){
          if(plateCount > 0) spawnCrow();
          scheduleCrow();
        }
      }, delay);
    }

    function spawnCrow(){
      var fromLeft = Math.random() < 0.5;
      var crow = document.createElement('div');
      crow.className = 'crow';
      crow.innerHTML = '<div class="crow-wing left"></div><div class="crow-body"><div class="crow-eye"></div></div><div class="crow-wing right"></div>';
      document.body.appendChild(crow);
      var vw = window.innerWidth, vh = window.innerHeight;
      var plateRect = plateArea.getBoundingClientRect();
      var startX = fromLeft ? -80 : vw+20;
      var startY = vh*0.12;
      var midX = plateRect.left + plateRect.width/2 - 32;
      var midY = plateRect.top - 10;
      var endX = fromLeft ? vw+20 : -80;
      var endY = vh*0.08;
      var flip = fromLeft ? 1 : -1;
      var anim = crow.animate([
        { transform:'translate('+startX+'px,'+startY+'px) scaleX('+flip+')' },
        { transform:'translate('+midX+'px,'+midY+'px) scaleX('+flip+')', offset:0.55 },
        { transform:'translate('+endX+'px,'+endY+'px) scaleX('+(-flip)+')' }
      ], { duration:1700, easing:'ease-in-out' });
      var stolen = false;
      setTimeout(function(){
        if(!cleared && plateCount > 0 && !stolen){
          stolen = true;
          stealOne(crow);
        }
      }, 1700*0.55);
      anim.onfinish = function(){ if(crow.parentNode) crow.parentNode.removeChild(crow); };
    }

    function stealOne(crowEl){
      plateCount = Math.max(0, plateCount-1);
      playStealSound();
      renderPlateIcons();
      updateRemainingDisplay();
      var r = plateArea.getBoundingClientRect();

      beltItems.slice().forEach(function(item){
        if(item.held) return;

        item.el.style.transform = 'translateX('+item.x+'px)';
        if(item.x > w + 40){ removeBeltItem(item); }

      beltItems.slice().forEach(removeBeltItem);
      target = 3 + Math.floor(Math.random()*4); // 3..6

      scheduleSpawn();

      if(rafId==null){ rafId = requestAnimationFrame(mainLoop); }
    };
    resetBtn.addEventListener('pointerdown', function(e){ e.stopPropagation(); window.resetCountGame(); });
  })();

      for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; }
      return a;
    }
    function makeImg(src, alt, cls){
      var img = document.createElement('img');
      img.src = src; img.alt = alt || '';
      if(cls) img.className = cls;
      img.addEventListener('error', function(){ imgFallback(img); });
      return img;
    }

    document.querySelectorAll('.car-diff-btn').forEach(function(btn){
      btn.addEventListener('pointerdown', function(e){
        e.stopPropagation();
        startDifficulty(btn.dataset.diff);
      });
    });
    document.getElementById('carBackBtn').addEventListener('pointerdown', function(e){
      e.stopPropagation();
      if(playArea.style.display !== 'none' || puzzleArea.style.display !== 'none'){
        // mid-game -> back to this game's difficulty select
        cleanupMotion();
        diffSelect.style.display = '';
        playArea.style.display = 'none';
        puzzleArea.style.display = 'none';
      } else {
        // already on difficulty select -> back to the main menu
        showScreen('menu');
      }
    });

    function startDifficulty(diff){
      difficulty = diff;
      diffSelect.style.display = 'none';
      if(diff === 'puzzle'){
        puzzleArea.style.display = 'flex';

      }

    }

    function newRound(){
      locked = false;
      target = CARS[Math.floor(Math.random()*CARS.length)];
      monsterImgCar.src = 'images/monster_normal.png';
      monsterImgCar.classList.remove('car-stumble');

      flashBubble(carBubble, 'おなじ かたちを みつけてね！');

      else { buildStandardRound(); }
    }

    function buildStandardRound(){
      var decoys = shuffle(CARS.filter(function(c){ return c.id !== target.id; })).slice(0,3);
      var choices = shuffle([target].concat(decoys));

      choicesTray.innerHTML = '';

      if(difficulty === 'expert'){ mode = Math.random() < 0.5 ? 'half-left' : 'half-right'; }

      if(mode === 'overlap'){

    function buildAdvancedRound(){
      var decoys = shuffle(CARS.filter(function(c){ return c.id !== target.id; })).slice(0,5);
      var slots = shuffle([target].concat(decoys));

      shadowZone.innerHTML = '';

        var slot = document.createElement('div');

      el.appendChild(inner);

    /* single-shadow-zone drop target (beginner / intermediate / expert) */
    function attachCarDragStandard(el, carId){
      attachDrag(el, function(){ return document.getElementById('carShadowMain') || shadowZone; }, {
        pad:0.15,
        canDrag:function(){ return !locked; },
        onDrop:function(el){
          if(locked) return;
          if(carId === target.id){ carCorrect(el, null); }
          else { carWrong(el); }
        },
        onMiss:function(el){ bounceHome(el); }
      });
    }

    /* multi-target drop (advanced/reverse: drag the one illustration onto one of 6 shadow slots) */
    function attachCarDragReverse(el, carId){
      var startX=0, startY=0, dragging=false;
      el.addEventListener('pointerdown', function(e){
        if(locked) return;
        ensureAudio();
        dragging = true;
        el.classList.add('dragging');
        try{ el.setPointerCapture(e.pointerId); }catch(err){}
        startX = e.clientX; startY = e.clientY;
        el.style.transition = 'none';
      });
      el.addEventListener('pointermove', function(e){
        if(!dragging) return;
        var dx = e.clientX-startX, dy = e.clientY-startY;
        el.style.transform = 'translate('+dx+'px,'+dy+'px) scale(1.12)';
      });
      function endDrag(){
        if(!dragging) return;
        dragging = false;
        el.classList.remove('dragging');
        var pRect = el.getBoundingClientRect();
        var pCenterX = pRect.left+pRect.width/2, pCenterY = pRect.top+pRect.height/2;
        var slots = shadowZone.querySelectorAll('.car-shadow-slot');
        var hitSlot = null;
        slots.forEach(function(slot){
          var r = slot.getBoundingClientRect();
          var padX = r.width*0.2, padY = r.height*0.2;
          if(pCenterX > r.left-padX && pCenterX < r.right+padX && pCenterY > r.top-padY && pCenterY < r.bottom+padY){
            hitSlot = slot;
          }
        });
        if(!hitSlot){ bounceHome(el); return; }
        if(hitSlot.dataset.carId === target.id){ carCorrect(el, hitSlot); }
        else { carWrong(el); }
      }
      el.addEventListener('pointerup', endDrag);
      el.addEventListener('pointercancel', endDrag);
    }

    function carCorrect(el, matchedSlot){
      locked = true;
      playCatchSound(1);
      playCelebrationSound();
      var rect = el.getBoundingClientRect();
      showSfxPop(rect, SFX_WORDS[Math.floor(Math.random()*SFX_WORDS.length)]);

      var revealImg;

        matchedSlot.classList.add('matched');
        revealImg = matchedSlot.querySelector('img');
      } else {
        revealImg = document.getElementById('carShadowMain');
        var layer2 = shadowZone.querySelector('.layer2');
        if(layer2) layer2.style.display = 'none';
      }
      if(revealImg){
        revealImg.classList.remove('car-shadow-spin','car-shadow-half-left','car-shadow-half-right');
        revealImg.style.clipPath = 'none';
        revealImg.style.transition = 'transform .3s ease';
        revealImg.src = 'images/'+target.id+'.png';
      }
      el.style.transition = 'opacity .25s ease';
      el.style.opacity = '0';

      monsterImgCar.src = 'images/monster_happy.png';
      spawnStars();
      registerCorrect();
      showResultMark(true);
      flashBubble(carBubble, 'せいかい！🎉');
      nextBtn.style.display = '';
    }

    function carWrong(el){
      playRejectSound();
      bounceHome(el);
      showResultMark(false);
      monsterImgCar.src = 'images/monster_weird.png';
      monsterImgCar.classList.add('car-stumble');
      flashBubble(carBubble, 'ちがう みたい...');
      setTimeout(function(){
        monsterImgCar.classList.remove('car-stumble');
        monsterImgCar.src = 'images/monster_normal.png';
      }, 900);
    }

    nextBtn.addEventListener('pointerdown', function(e){ e.stopPropagation(); newRound(); });

    window.resetCarGame = function(){
      cleanupMotion();
      diffSelect.style.display = '';
      playArea.style.display = 'none';
      puzzleArea.style.display = 'none';
    };

    /* ===================================================================
       GAME 3b: シェイクパズル (shake-to-shatter, 6-piece reassembly puzzle)
       =================================================================== */
    var puzzleStage = document.getElementById('puzzleStage');
    var puzzleGuide = document.getElementById('puzzleGuideShadow');
    var puzzleGuideLines = document.getElementById('puzzleGuideLines');
    var puzzleBubble = document.getElementById('puzzleBubble');
    var monsterImgPuzzle = document.getElementById('monsterImgPuzzle');
    var puzzleShakeBtn = document.getElementById('puzzleShakeBtn');
    var puzzleNextBtn = document.getElementById('puzzleNextBtn');

    var PIECE_COUNT_OPTIONS = [6, 8, 10];
    var PIECE_COUNT = 6; // re-rolled from PIECE_COUNT_OPTIONS every round
    var SNAP_RADIUS = 55;
    var puzzleCar = null, pieces = [], puzzleShattered = false;
    var motionHandler = null, lastAccel = null, lastShakeTime = 0;
    var currentAngles = []; // randomized wedge-boundary angles, re-rolled every round
    var zTop = 10; // running stacking-order counter so grabbed/loose pieces always render above placed ones

    function randomizeAngles(){
      var base = 360/PIECE_COUNT;
      var jitter = base * 0.45; // keeps every wedge a reasonable, grabbable size
      var angles = [];
      for(var i=0;i<PIECE_COUNT;i++){
        angles.push(i*base + (Math.random()*2-1)*jitter);
      }
      currentAngles = angles;
    }
    function pieceClipPath(i){
      var startDeg = currentAngles[i];
      var endDeg = (i < PIECE_COUNT-1) ? currentAngles[i+1] : currentAngles[0] + 360;
      function pt(deg){
        var rad = deg * Math.PI/180;
        var x = 50 + 150*Math.cos(rad), y = 50 + 150*Math.sin(rad);
        return x.toFixed(1)+'% '+y.toFixed(1)+'%';
      }
      return 'polygon(50% 50%, '+pt(startDeg)+', '+pt(endDeg)+')';
    }
    function boundaryPoint(deg){
      // where a ray from the center (50,50) at angle deg hits the square edge of a 0-100 box
      var rad = deg * Math.PI/180;
      var cosA = Math.cos(rad), sinA = Math.sin(rad);
      var r = 50 / Math.max(Math.abs(cosA), Math.abs(sinA), 0.0001);
      return { x: 50 + r*cosA, y: 50 + r*sinA };
    }
    function buildGuideLines(){
      var svgNS = 'http://www.w3.org/2000/svg';
      puzzleGuideLines.innerHTML = '';
      for(var i=0;i<PIECE_COUNT;i++){
        var p = boundaryPoint(currentAngles[i]);
        var line = document.createElementNS(svgNS, 'line');
        line.setAttribute('x1','50'); line.setAttribute('y1','50');
        line.setAttribute('x2', p.x.toFixed(2)); line.setAttribute('y2', p.y.toFixed(2));
        puzzleGuideLines.appendChild(line);
      }
    }

    function applyPieceTransform(piece, extraX, extraY, rotOverride, scaleOverride){
      var x = piece.restX + (extraX||0), y = piece.restY + (extraY||0);
      var rot = (rotOverride != null) ? rotOverride : piece.restRot;
      var sc = (scaleOverride != null) ? scaleOverride : (piece.restScale != null ? piece.restScale : 1);
      piece.el.style.transform = 'translate('+x+'px,'+y+'px) rotate('+rot+'deg) scale('+sc+')';
    }

    function buildPuzzlePieces(car){
      puzzleStage.querySelectorAll('.puzzle-piece').forEach(function(p){ p.remove(); });
      pieces = [];
      for(var i=0;i<PIECE_COUNT;i++){
        var el = document.createElement('div');
        el.className = 'puzzle-piece';
        el.style.clipPath = pieceClipPath(i);
        el.style.zIndex = ++zTop;
        var inner = document.createElement('div');
        inner.className = 'puzzle-piece-inner';
        inner.appendChild(makeImg('images/'+car.id+'.png', '', null));
        el.appendChild(inner);
        puzzleStage.appendChild(el);
        var piece = { el:el, restX:0, restY:0, restRot:0, restScale:1, placed:false };
        pieces.push(piece);
        attachPuzzleDrag(piece);
        applyPieceTransform(piece);
      }
    }

    function reflectClamp(v, max){
      // "bounces" a value back inside [-max,max] like a ball off a wall, instead of
      // pinning it to the exact boundary - keeps distinct pieces from ever landing on
      // the exact same clamped spot, and reads as a real bounce rather than a hard stop
      if(max <= 0) return 0;
      var sign = v < 0 ? -1 : 1;
      var av = Math.abs(v) % (max*2);
      if(av > max) av = max*2 - av;
      return sign*av;
    }

    var SCATTER_SCALE = 0.55; // shrink pieces while scattered so they can spread out widely and still stay fully on-screen

    function scatterPieces(){
      // A piece element is the full stage size (only a wedge shows), so its visible
      // pixels reach from the stage center out to roughly half the stage size, times
      // the scatter scale. Bound each piece's travel so those visible pixels never
      // cross the screen edge, and bounce (not pin) overshoot so pieces don't pile up.
      var stageRect = puzzleStage.getBoundingClientRect();
      var stageCenterX = stageRect.left + stageRect.width/2;
      var stageCenterY = stageRect.top + stageRect.height/2;
      var margin = 12;
      var reachX = (stageRect.width/2) * SCATTER_SCALE;
      var reachY = (stageRect.height/2) * SCATTER_SCALE;
      var maxX = Math.max(0, Math.min(stageCenterX, window.innerWidth - stageCenterX) - reachX - margin);
      var maxY = Math.max(0, Math.min(stageCenterY, window.innerHeight - stageCenterY) - reachY - margin);
      pieces.forEach(function(piece){
        var angle = Math.random()*Math.PI*2;
        var dist = 170 + Math.random()*170; // pushed well clear of the stage, not just the edge of the hole
        var x = reflectClamp(Math.cos(angle)*dist, maxX);
        var y = reflectClamp(Math.sin(angle)*dist, maxY);
        piece.restX = x;
        piece.restY = y;
        piece.restRot = Math.random()*140-70;
        piece.restScale = SCATTER_SCALE;
        piece.el.style.transition = 'transform .55s cubic-bezier(.34,2.1,.64,1)';
        applyPieceTransform(piece);
      });
    }

    function attachPuzzleDrag(piece){
      var el = piece.el;
      var inner = el.querySelector('.puzzle-piece-inner');
      var startX=0, startY=0, dragging=false;
      el.addEventListener('pointerdown', function(e){
        if(!puzzleShattered || piece.placed) return;
        ensureAudio();
        dragging = true;
        el.classList.add('dragging');
        el.style.zIndex = ++zTop; // always bring the grabbed piece to the very top, above any other piece
        try{ el.setPointerCapture(e.pointerId); }catch(err){}
        startX = e.clientX; startY = e.clientY;
        // straighten AND restore full size the moment it's grabbed, so the shape is easy to read while dragging
        el.style.transition = 'transform .18s ease';
        applyPieceTransform(piece, 0, 0, 0, 1);
        setTimeout(function(){ if(dragging) el.style.transition = 'none'; }, 180);
      });
      el.addEventListener('pointermove', function(e){
        if(!dragging) return;
        applyPieceTransform(piece, e.clientX-startX, e.clientY-startY, 0, 1);
      });
      function endDrag(e){
        if(!dragging) return;
        dragging = false;
        el.classList.remove('dragging');
        var dx = e.clientX-startX, dy = e.clientY-startY;
        var finalX = piece.restX+dx, finalY = piece.restY+dy;
        var dist = Math.sqrt(finalX*finalX + finalY*finalY);
        el.style.transition = 'transform .35s cubic-bezier(.34,1.56,.64,1)';
        if(dist <= SNAP_RADIUS){
          piece.restX = 0; piece.restY = 0; piece.restRot = 0; piece.restScale = 1;
          piece.placed = true;
          el.classList.add('placed');
          el.style.zIndex = '1'; // sink below any still-loose pieces so they stay grabbable
          applyPieceTransform(piece);
          playCatchSound(1);
          checkPuzzleSolved();
        } else {
          // stay right where it was released (full size, since the user placed it there)
          piece.restX = finalX; piece.restY = finalY; piece.restRot = 0; piece.restScale = 1;
          applyPieceTransform(piece);
        }
      }
      el.addEventListener('pointerup', endDrag);
      el.addEventListener('pointercancel', endDrag);
    }

    function checkPuzzleSolved(){
      if(!pieces.every(function(p){ return p.placed; })) return;
      monsterImgPuzzle.src = 'images/monster_happy.png';
      flashBubble(puzzleBubble, 'できた！🎉');
      playCelebrationSound();
      spawnStars();
      registerCorrect();
      showResultMark(true);
      puzzleNextBtn.style.display = '';
    }

    function playShatterSound(){ beep(1200,0.06,0,'square',0.2); beep(900,0.08,0.04,'square',0.18); beep(700,0.1,0.08,'square',0.16); }

    function shatterPuzzle(){
      if(puzzleShattered) return;
      puzzleShattered = true;
      ensureAudio();
      playShatterSound();
      shakeScreen(screenEl);
      puzzleShakeBtn.style.display = 'none';
      flashBubble(puzzleBubble, 'ピースを あわせてね！');
      scatterPieces();
    }

    function setupMotion(){
      cleanupMotion();
      motionHandler = function(e){
        var a = e.accelerationIncludingGravity || e.acceleration;
        if(!a || a.x==null) return;
        var now = Date.now();
        if(lastAccel){
          var d = Math.abs(a.x-lastAccel.x)+Math.abs(a.y-lastAccel.y)+Math.abs(a.z-lastAccel.z);
          if(d > 28 && now-lastShakeTime > 800){
            lastShakeTime = now;
            shatterPuzzle();
          }
        }
        lastAccel = {x:a.x,y:a.y,z:a.z};
      };
      window.addEventListener('devicemotion', motionHandler);
    }
    function cleanupMotion(){
      if(motionHandler){ window.removeEventListener('devicemotion', motionHandler); motionHandler = null; }
      lastAccel = null;
    }

    puzzleShakeBtn.addEventListener('pointerdown', function(e){
      e.stopPropagation();
      ensureAudio();
      if(typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function'){
        DeviceMotionEvent.requestPermission().then(function(res){
          if(res === 'granted'){ setupMotion(); }
        }).catch(function(){});
      } else {
        setupMotion();
      }
      // guaranteed fallback so the game always progresses even if shake/permission fails
      shatterPuzzle();
    });
    puzzleNextBtn.addEventListener('pointerdown', function(e){ e.stopPropagation(); newPuzzleRound(); });

    function newPuzzleRound(){
      puzzleCar = CARS[Math.floor(Math.random()*CARS.length)];
      PIECE_COUNT = PIECE_COUNT_OPTIONS[Math.floor(Math.random()*PIECE_COUNT_OPTIONS.length)];
      puzzleShattered = false;
      puzzleGuide.src = 'images/'+puzzleCar.id+'_shadow.png';
      puzzleGuide.onerror = function(){ imgFallback(puzzleGuide); };
      puzzleGuide.style.opacity = '0';
      puzzleGuideLines.style.opacity = '0';
      monsterImgPuzzle.src = 'images/monster_normal.png';
      puzzleNextBtn.style.display = 'none';
      puzzleShakeBtn.style.display = '';
      flashBubble(puzzleBubble, 'スマホを ふってね！<br>（ボタンでもOK）');
      randomizeAngles();
      buildGuideLines();
      buildPuzzlePieces(puzzleCar);
      setTimeout(function(){ puzzleGuide.style.opacity = '.35'; puzzleGuideLines.style.opacity = '.9'; }, 50);
      setupMotion();
    }
  })();

  /* ===================================================================
     GAME 4: ぐるぐるクイズ (swirl-reveal photo quiz, no sticker reward)
     =================================================================== */
  (function(){
    var canvas = document.getElementById('guruguruCanvas');
    var ctx = canvas.getContext('2d');
    var W = canvas.width, H = canvas.height;
    var cx = W/2, cy = H/2, maxRadius = Math.sqrt(cx*cx + cy*cy);
    var swirlDirection = 1; // 1 = clockwise, -1 = counter-clockwise; re-rolled every round

    var DURATION_MS = 15000;
    var MAX_TURNS = 3.2;
    var UPDATE_INTERVAL_MS = 110;

    // candidate swirl-center spots so the hidden/last-revealed area differs every round
    var CENTER_CANDIDATES = ['center','topleft','topright','bottomleft','bottomright','random'];
    function pickSwirlCenter(){
      var choice = CENTER_CANDIDATES[Math.floor(Math.random()*CENTER_CANDIDATES.length)];
      switch(choice){
        case 'topleft': return { x: W*0.28, y: H*0.28 };
        case 'topright': return { x: W*0.72, y: H*0.28 };
        case 'bottomleft': return { x: W*0.28, y: H*0.72 };
        case 'bottomright': return { x: W*0.72, y: H*0.72 };
        case 'random': return { x: W*(0.2+Math.random()*0.6), y: H*(0.2+Math.random()*0.6) };
        default: return { x: W/2, y: H/2 };
      }
    }
    function farthestCornerDistance(px, py){
      var corners = [[0,0],[W,0],[0,H],[W,H]];
      var maxR = 0;
      corners.forEach(function(c){
        var dx = c[0]-px, dy = c[1]-py;
        var d = Math.sqrt(dx*dx+dy*dy);
        if(d > maxR) maxR = d;
      });
      return maxR;
    }

    var NAMES = [
      'パトカー','しょうぼうしゃ','きゅうきゅうしゃ','はしごしゃ','ショベルカー',
      'ブルドーザー','ダンプカー','クレーンしゃ','ミキサーしゃ','トラック',
      'ゴミしゅうしゅうしゃ','カーキャリア','タンクローリー','ロードローラー'
    ];

    var bubble = document.getElementById('guruguruBubble');
    var timeNumEl = document.getElementById('guruguruTimeNum');
    var timeBadge = document.getElementById('guruguruTimeBadge');
    var answerEl = document.getElementById('guruguruAnswer');
    var nextBtn = document.getElementById('guruguruNextBtn');
    var revealBtn = document.getElementById('guruguruRevealBtn');

    var srcData = null, dxArr, dyArr, percentArr;
    var startTime = null, timerId = null, currentName = null;

    function precomputePixelGeometry(){
      var n = W*H;
      dxArr = new Float32Array(n);
      dyArr = new Float32Array(n);
      percentArr = new Float32Array(n);
      var idx = 0;
      for(var y=0;y<H;y++){
        for(var x=0;x<W;x++){
          var dx = x-cx, dy = y-cy;
          var r = Math.sqrt(dx*dx+dy*dy);
          var percent = 1 - r/maxRadius;
          if(percent < 0) percent = 0;
          dxArr[idx]=dx; dyArr[idx]=dy;
          percentArr[idx] = percent*percent;
          idx++;
        }
      }
    }

    function renderFrame(strength){
      var out = ctx.createImageData(W,H);
      var src = srcData.data, dst = out.data;
      var idx = 0;
      for(var y=0;y<H;y++){
        for(var x=0;x<W;x++){
          var theta = strength * percentArr[idx];
          var cosT = Math.cos(theta), sinT = Math.sin(theta);
          var dx = dxArr[idx], dy = dyArr[idx];
          var srcX = Math.round(cx + (dx*cosT - dy*sinT));
          var srcY = Math.round(cy + (dx*sinT + dy*cosT));
          if(srcX<0) srcX=0; else if(srcX>=W) srcX=W-1;
          if(srcY<0) srcY=0; else if(srcY>=H) srcY=H-1;
          var o = idx*4;
          var s = (srcY*W+srcX)*4;
          dst[o]=src[s]; dst[o+1]=src[s+1]; dst[o+2]=src[s+2]; dst[o+3]=src[s+3];
          idx++;
        }
      }
      ctx.putImageData(out, 0, 0);
    }

    function speakAnswer(name){
      if(!('speechSynthesis' in window)) return;
      try{
        window.speechSynthesis.cancel();
        var utter = new SpeechSynthesisUtterance(name);
        utter.lang = 'ja-JP';
        utter.rate = 0.9;
        window.speechSynthesis.speak(utter);

      if(completed) return;

      revealBtn.style.display = 'none';

      function showAnswer(){
        answerEl.textContent = 'こたえ: ' + currentName;

        playCelebrationSound();

      }

      if(withShatterEffect){
        // don't draw the resolved photo onto the canvas yet - the shatter overlay
        // is what shows it during the effect, so leave the canvas blank underneath
        // to avoid the completed picture appearing twice at once
        ctx.clearRect(0, 0, W, H);
        var imgSrc = 'images/guruguru_' + encodeURIComponent(currentName) + '.png';
        playShatterReassemble(document.getElementById('guruguruStage'), imgSrc, function(){
          renderFrame(0); // now hand off to the canvas, matching what the overlay just showed
          showAnswer();
        });
      } else {
        renderFrame(0);
        showAnswer();
      }
    }

    function tick(){
      var elapsed = Date.now() - startTime;
      var t = Math.min(1, elapsed/DURATION_MS);
      var eased = 1 - Math.pow(1-t, 3);
      var strength = MAX_TURNS * 2*Math.PI * (1-eased) * swirlDirection;
      renderFrame(strength);
      var secLeft = Math.max(0, Math.ceil((DURATION_MS-elapsed)/1000));
      timeNumEl.textContent = secLeft;
      if(t >= 1){
        completeRound(false); // natural timeout: reveal directly, no shatter effect
      }
    }

      img.onload = function(){
        if(myRound !== roundId) return; // a newer round started before this image finished loading
        // "contain" fit: draw the whole illustration without cropping, letterboxed on
        // whichever axis doesn't match the stage's aspect ratio
        var scale = Math.min(W/img.width, H/img.height);
        var dw = img.width*scale, dh = img.height*scale;
        var dx0 = (W-dw)/2, dy0 = (H-dh)/2;
        ctx.fillStyle = '#fff';
        ctx.fillRect(0,0,W,H);
        ctx.drawImage(img, 0, 0, img.width, img.height, dx0, dy0, dw, dh);
        srcData = ctx.getImageData(0, 0, W, H);

        cx = center.x; cy = center.y;

        precomputePixelGeometry();
        startTime = Date.now();
        tick();
        timerId = setInterval(tick, UPDATE_INTERVAL_MS);
      };
      img.onerror = function(){
        if(myRound !== roundId) return;

      };
      img.src = 'images/guruguru_' + encodeURIComponent(currentName) + '.png';
    }

    nextBtn.addEventListener('pointerdown', function(e){ e.stopPropagation(); startRound(); });
    revealBtn.addEventListener('pointerdown', function(e){
      e.stopPropagation();

    });

    window.cleanupGuruguru = function(){

    function cfg(){ return MODES[currentMode]; }
    function key(r,c){ return r+','+c; }
    function edgeKey(a,b){ return a < b ? a+'|'+b : b+'|'+a; }
    function inBounds(r,c){ return r>=0 && r<GRID_ROWS && c>=0 && c<GRID_COLS; }
    function shuffle(arr){
      for(var i=arr.length-1;i>0;i--){
        var j = Math.floor(Math.random()*(i+1));
        var t=arr[i]; arr[i]=arr[j]; arr[j]=t;
      }
      return arr;
    }
    function gridNeighbors(r,c){
      return shuffle([[r-1,c],[r+1,c],[r,c-1],[r,c+1]].filter(function(p){ return inBounds(p[0],p[1]); }));
    }
    function manhattan(a,b){ return Math.abs(a[0]-b[0]) + Math.abs(a[1]-b[1]); }
    // Start/goal move to a new random pair of cells each maze, as long as
    // they're far enough apart to make for an interesting route.
    function pickStartGoal(){
      var s, g;
      do{
        s = [Math.floor(Math.random()*GRID_ROWS), Math.floor(Math.random()*GRID_COLS)];
        g = [Math.floor(Math.random()*GRID_ROWS), Math.floor(Math.random()*GRID_COLS)];
      } while(manhattan(s,g) < Math.min(GRID_ROWS,GRID_COLS));
      START = s; GOAL = g;
    }

    // Randomized backtracking walk from START to GOAL, producing one simple
    // (non-branching) solution path - a fresh shape every time it's called.
    // Randomized Prim's algorithm: grows the maze outward from every point on
    // its current edge at once (a "frontier" of candidate cells), rather than
    // snaking away from a single head like a recursive backtracker does.
    // That keeps growth spread out fairly evenly across the whole grid -
    // no far corner ends up as one long lonely corridor that reads as
    // "unused" - while still producing a proper spanning tree (every one of
    // the GRID_ROWS*GRID_COLS cells reachable, exactly one route between
    // any two cells, dead ends everywhere).
    function carveFullMaze(){
      var startKey = key(START[0],START[1]);
      var visited = {}; visited[startKey] = true;
      var edges = new Set();
      var pairs = [];
      var frontier = []; // [fromKey, toKey] candidate connections into the maze
      function addFrontier(k){
        var parts = k.split(','); var r = +parts[0], c = +parts[1];
        gridNeighbors(r,c).forEach(function(nb){
          var nk = key(nb[0], nb[1]);
          if(!visited[nk]) frontier.push([k, nk]);
        });
      }
      addFrontier(startKey);
      while(frontier.length){
        var idx = Math.floor(Math.random()*frontier.length);
        var pick = frontier.splice(idx, 1)[0];
        var from = pick[0], to = pick[1];
        if(visited[to]) continue; // may have been claimed by another frontier entry since
        visited[to] = true;
        edges.add(edgeKey(from, to));
        pairs.push([from, to]);
        addFrontier(to);
      }
      return { edges: edges, pairs: pairs, visited: visited };
    }

    // BFS over the maze's tree edges to find the (unique) direct route from
    // start to goal - this is the "trail" that gimmicks get placed along.
    function treePath(edges, startKey, goalKey){
      var adjacency = {};
      edges.forEach(function(e){
        var parts = e.split('|');
        (adjacency[parts[0]] = adjacency[parts[0]] || []).push(parts[1]);
        (adjacency[parts[1]] = adjacency[parts[1]] || []).push(parts[0]);
      });
      var visited = {}; visited[startKey] = null;
      var queue = [startKey];
      while(queue.length){
        var cur = queue.shift();
        if(cur === goalKey) break;
        (adjacency[cur]||[]).forEach(function(nb){
          if(!(nb in visited)){ visited[nb] = cur; queue.push(nb); }
        });
      }
      var path = [goalKey];
      var step = goalKey;
      while(step !== startKey){ step = visited[step]; path.push(step); }
      path.reverse();
      return path;
    }

    function generateMaze(){
      pickStartGoal();
      var startKey = key(START[0],START[1]), goalKey = key(GOAL[0],GOAL[1]);
      var maze = carveFullMaze();
      var trail = treePath(maze.edges, startKey, goalKey);
      var trailSet = {}; trail.forEach(function(k){ trailSet[k] = true; });

      var usedIdx = {};
      function pickInteriorIdx(){
        if(trail.length < 4) return null;
        for(var tries=0; tries<20; tries++){
          var idx = 1 + Math.floor(Math.random()*(trail.length-2));
          if(!usedIdx[idx]){ usedIdx[idx] = true; return idx; }
        }
        return null;
      }

      lightCell = null; lightState = 'green';
      if(cfg().hasLight){
        var li = pickInteriorIdx();
        if(li != null) lightCell = trail[li];
      }
      // The gate sits ON the direct route (it genuinely blocks progress),
      // but its switch is deliberately placed on a SIDE branch off the trail
      // - so there's a real chance of walking past without noticing it,
      // unlike before when both were mandatory stops on the one road.
      switchCell = null; gateCell = null; gateOpen = false;
      if(cfg().hasSwitch){
        var gi = pickInteriorIdx();
        if(gi != null){
          gateCell = trail[gi];
          var reservedSoFar = {}; [lightCell, gateCell].forEach(function(k){ if(k) reservedSoFar[k]=true; });
          // The switch's own access route from start must NOT cross the gate
          // cell - otherwise you'd have to pass the (closed) gate just to
          // reach the switch that opens it, a permanent deadlock. Only trail
          // nodes BEFORE the gate (trail[0..gi-1]) can safely branch off to
          // an off-trail switch.
          var beforeGateSet = {};
          for(var pgi=0; pgi<gi; pgi++){ beforeGateSet[trail[pgi]] = true; }
          var offTrailCandidates = shuffle(Object.keys(maze.visited).filter(function(k){
            if(trailSet[k] || reservedSoFar[k]) return false;
            var accessPath = treePath(maze.edges, startKey, k);

      // car between them. Both ends live on side branches, never on the
      // direct start->goal route, so stepping into either one is a pure
      // optional shortcut/bonus - it can never short-circuit the main trail
      // or strand any cell in between.
      warpCellA = null; warpCellB = null;
      if(cfg().hasWarp){
        var warpReservedSoFar = {}; [lightCell, switchCell, gateCell].forEach(function(k){ if(k) warpReservedSoFar[k]=true; });

          return !trailSet[k] && !warpReservedSoFar[k];

        if(warpCandidates.length >= 2){

      // exist purely to mislead, so wandering off the direct route can be
      // punished without ever making part of the grid truly unreachable.
      // Critically, the switch and both warp cells are only useful if you can
      // actually WALK to them, so every cell on their one-and-only access
      // route from the trail is off-limits to traps too - otherwise an
      // obstacle could seal one off and make it permanently unreachable.
      var reserved = {};
      [lightCell, switchCell, gateCell, warpCellA, warpCellB].forEach(function(k){ if(k) reserved[k] = true; });
      if(switchCell){
        treePath(maze.edges, startKey, switchCell).forEach(function(k){ reserved[k] = true; });
      }
      if(warpCellA){
        treePath(maze.edges, startKey, warpCellA).forEach(function(k){ reserved[k] = true; });
      }
      if(warpCellB){
        treePath(maze.edges, startKey, warpCellB).forEach(function(k){ reserved[k] = true; });
      }

      var trapWanted = cfg().stages[stageIndex].traps;
      var trapCandidates = shuffle(Object.keys(maze.visited).filter(function(k){

      edgeSet = maze.edges;
      trapCells = traps;

      // walkable route reads as one continuous ribbon - any road-tile cell
      // NOT joined by a bridge is a true dead end, not just a missing texture.
      var boardRect = boardEl.getBoundingClientRect();

        var left = Math.min(a.left, b.left) - boardRect.left;
        var top = Math.min(a.top, b.top) - boardRect.top;
        var right = Math.max(a.right, b.right) - boardRect.left;
        var bottom = Math.max(a.bottom, b.bottom) - boardRect.top;
