        conn.className = 'maze-connector';
        conn.style.left = left + 'px';
        conn.style.top = top + 'px';
        conn.style.width = (right-left) + 'px';
        conn.style.height = (bottom-top) + 'px';
        boardEl.appendChild(conn);
      });
      // Every cell is a road tile now, so any two grid-adjacent cells that
      // AREN'T bridged above have no legal move between them - mark that
      // boundary with a little fence so it reads as blocked, not just empty.
      for(var r2=0; r2<GRID_ROWS; r2++){
        for(var c2=0; c2<GRID_COLS; c2++){
          var k2 = key(r2,c2);
          [[r2+1,c2],[r2,c2+1]].forEach(function(nb){
            var nr = nb[0], nc = nb[1];
            if(!inBounds(nr,nc)) return;
            var nk = key(nr,nc);
            if(edgeSet.has(edgeKey(k2,nk))) return; // legal move - already bridged
            var elA = cellEls[k2], elB = cellEls[nk];
            if(!elA || !elB) return;
            var ra = elA.getBoundingClientRect(), rb = elB.getBoundingClientRect();
            var fence = document.createElement('div');
            var horizontal = (r2 === nr); // side-by-side cells -> vertical fence bar between them
            fence.className = 'maze-fence ' + (horizontal ? 'v' : 'h');
            if(horizontal){
              fence.style.left = ((ra.right + rb.left)/2 - boardRect.left - 3) + 'px';
              fence.style.top = (Math.min(ra.top,rb.top) - boardRect.top + 4) + 'px';
              fence.style.height = ((Math.max(ra.bottom,rb.bottom) - Math.min(ra.top,rb.top)) - 8) + 'px';
            } else {
              fence.style.top = ((ra.bottom + rb.top)/2 - boardRect.top - 3) + 'px';
              fence.style.left = (Math.min(ra.left,rb.left) - boardRect.left + 4) + 'px';
              fence.style.width = ((Math.max(ra.right,rb.right) - Math.min(ra.left,rb.left)) - 8) + 'px';
            }
            boardEl.appendChild(fence);
          });
        }
      }
    }

    // Converts a cell's real rendered box (which includes the grid's gap and
    // padding, unlike naive "r/c * 100/GRID_ROWS/COLS" percentage math) into a
    // position/size relative to #mazeBoardWrap, in percent so it keeps
    // tracking correctly if the wrap is later resized.
    function cellBoxPct(r, c){
      var cellEl = cellEls[key(r,c)];
      var wrapRect = boardWrapEl.getBoundingClientRect();
      if(!cellEl || !wrapRect.width || !wrapRect.height){
        var stepX = 100/GRID_COLS, stepY = 100/GRID_ROWS;
        return { left: c*stepX, top: r*stepY, width: stepX, height: stepY };
      }
      var cr = cellEl.getBoundingClientRect();
      return {
        left: (cr.left - wrapRect.left) / wrapRect.width * 100,
        top: (cr.top - wrapRect.top) / wrapRect.height * 100,
        width: cr.width / wrapRect.width * 100,
        height: cr.height / wrapRect.height * 100
      };
    }
    function placeCar(animate){
      carEl.style.transition = animate ? '' : 'none';
      var box = cellBoxPct(pos.r, pos.c);
      carEl.style.width = box.width + '%';
      carEl.style.height = box.height + '%';
      carEl.style.left = box.left + '%';
      carEl.style.top = box.top + '%';
      if(!animate){ void carEl.offsetWidth; carEl.style.transition = ''; }
    }

    function isGoal(){ return pos.r === GOAL[0] && pos.c === GOAL[1]; }

    function setControlsEnabled(enabled){
      [upBtn,leftBtn,rightBtn,downBtn,undoBtn,hintBtn].forEach(function(b){ b.disabled = !enabled; });
    }

    function celebrate(){
      won = true;
      clearGimmickTimers();
      setControlsEnabled(false);
      var c = cfg();
      bubbleEl.textContent = c.winPreText;
      if(c.winEffect === 'siren'){
        carEl.classList.add('siren');
        beep(880, 0.15, 0, 'square', 0.18);
        beep(660, 0.15, 0.16, 'square', 0.18);
        beep(880, 0.15, 0.32, 'square', 0.18);
        beep(660, 0.15, 0.48, 'square', 0.18);
      } else {
        showEffect(GOAL[0], GOAL[1], c.winEffect);
        if(c.winEffect === 'arrest'){
          beep(700, 0.08, 0, 'square', 0.2);
          beep(500, 0.08, 0.12, 'square', 0.2);
          beep(700, 0.08, 0.24, 'square', 0.2);
          beep(500, 0.08, 0.36, 'square', 0.2);
        } else {
          beep(520, 0.1, 0, 'sine', 0.2);
          beep(600, 0.12, 0.1, 'sine', 0.2);
          beep(680, 0.14, 0.2, 'sine', 0.18);
        }
      }
      setTimeout(function(){
        if(goalImgEl){ goalImgEl.src = c.goalSafeImg; }
        carEl.classList.add('win');
        carEl.classList.remove('siren');
        var isLast = stageIndex >= c.stages.length-1;
        bubbleEl.textContent = isLast ? 'すごい！ ぜんぶ クリア できたね！' : c.winPostText;
        nextBtn.hidden = isLast;
        replayBtn.textContent = isLast ? 'さいしょから あそぶ🎉' : 'もういちど あそぶ🎉';
        if(c.winEffect === 'siren'){
          badgePopupEl.classList.add('show');
          setTimeout(function(){ badgePopupEl.classList.remove('show'); }, 1800);
        }
        winPanelEl.classList.add('show');
        if(typeof playCelebrationSound === 'function') playCelebrationSound();
        spawnStars && spawnStars(3);
      }, 650);
    }

    function showEffect(r, c, type){
      var el = document.createElement('div');
      el.className = 'maze-effect ' + type;
      el.textContent = EFFECT_EMOJI[type] || '💥';
      var box = cellBoxPct(r, c);
      el.style.width = box.width + '%';
      el.style.height = box.height + '%';
      el.style.left = box.left + '%';
      el.style.top = box.top + '%';
      boardWrapEl.appendChild(el);
      setTimeout(function(){ el.remove(); }, 750);
    }

    function playTrapSound(type){
      if(type === 'puddle'){
        beep(520, 0.1, 0, 'sine', 0.18);
        beep(380, 0.12, 0.07, 'sine', 0.16);
        beep(300, 0.14, 0.14, 'sine', 0.14);
      } else if(typeof playRejectSound === 'function'){
        playRejectSound();
      }
    }

    var TRAP_MESSAGE = {
      barricade:'あー！ バリケードだ！ さいしょから！', puddle:'あー！ みずたまりだ！ さいしょから！',
      cone:'あー！ コーンだ！ さいしょから！', fallenTree:'あー！ たおれた きだ！ さいしょから！',
      trafficjam:'あー！ じゅうたいだ！ さいしょから！'
    };
    function resetToStart(){
      pos = { r: START[0], c: START[1] };
      history = [];
      placeCar(false);
      bubbleEl.textContent = 'やじるしで すすもう！';
    }
    function hitTrap(nr, nc, type){
      locked = true;
      ensureAudio();
      setControlsEnabled(false);
      showEffect(nr, nc, type);
      playTrapSound(type);
      screenEl.classList.remove('shake'); void screenEl.offsetWidth; screenEl.classList.add('shake');
      bubbleEl.textContent = TRAP_MESSAGE[type] || 'あー！ さいしょから！';
      setTimeout(function(){
        resetToStart();
        setControlsEnabled(true);
        locked = false;
      }, 700);
    }

    // Riding onto either warp-tunnel cell: instantly (deterministically)
    // teleports to its fixed paired cell - no randomness, always the same
    // other end.
    function crossWarp(otherKey){
      locked = true;
      setControlsEnabled(false);
      beep(520, 0.1, 0, 'triangle', 0.16);
      beep(760, 0.12, 0.08, 'triangle', 0.16);
      setTimeout(function(){
        carEl.classList.remove('spin'); void carEl.offsetWidth; carEl.classList.add('spin');
        bubbleEl.textContent = 'ワープ！';
        var ep = otherKey.split(',');
        pos = { r: +ep[0], c: +ep[1] };
        placeCar(true);
        setTimeout(function(){
          bubbleEl.textContent = 'やじるしで すすもう！';
          locked = false;
          setControlsEnabled(true);
          if(isGoal()){ setTimeout(celebrate, 320); }
        }, 400);
      }, 250);
    }

    function clearGimmickTimers(){
      gimmickTimers.forEach(function(id){ clearInterval(id); });
      gimmickTimers = [];
    }
    function paintLight(){
      if(!lightCellEl || !lightDotEl) return;
      lightDotEl.className = 'maze-gimmick-dot ' + (lightState === 'red' ? 'red' : 'green');
      lightCellEl.classList.toggle('gimmick-blocked', lightState === 'red');
    }
    function paintGate(){
      if(!gateCellEl) return;
      gateCellEl.classList.toggle('gimmick-blocked', !gateOpen);
    }
    function startGimmickTimers(){
      clearGimmickTimers();
      if(lightCell){
        paintLight();
        gimmickTimers.push(setInterval(function(){
          lightState = lightState === 'red' ? 'green' : 'red';
          paintLight();
        }, 1800));
      }
      if(gateCell) paintGate();
    }

    // Returns a message string if the gimmick at nk currently blocks entry,
    // or null if it's fine to proceed (also handles the switch's side effect
    // of flipping its linked gate open the moment you step on it).
    function checkGimmickBlock(nk){
      if(nk === lightCell && lightState === 'red') return 'あかしんごうだよ！ まってね';
      if(nk === gateCell && !gateOpen) return 'ゲートが しまってるよ！ スイッチを さがそう';
      return null;
    }
    function onEnterSwitch(nk){
      if(nk === switchCell){
        gateOpen = !gateOpen;
        paintGate();
        beep(700, 0.1, 0, 'square', 0.16);
        beep(900, 0.12, 0.08, 'square', 0.16);
      }
    }

    function tryMove(dr,dc,bx,by){
      if(won || locked) return;
      ensureAudio();
      var nr = pos.r + dr, nc = pos.c + dc;
      if(!inBounds(nr,nc)){
        bump(bx,by);
        return;
      }
      var curKey = key(pos.r,pos.c), nk = key(nr,nc);
      if(!edgeSet.has(edgeKey(curKey,nk))){
        bump(bx,by);
        if(cfg() && cfg().traceControl){
          bubbleEl.textContent = 'せんから はずれたよ！';
          setTimeout(function(){ if(!won && !locked) bubbleEl.textContent = 'ゆびで なぞって すすもう！'; }, 1000);
        }
        return;
      }
      var blockMsg = checkGimmickBlock(nk);
      if(blockMsg){
        bump(bx,by);
        bubbleEl.textContent = blockMsg;
        var defaultMsg = cfg() && cfg().traceControl ? 'ゆびで なぞって すすもう！' : 'やじるしで すすもう！';
        setTimeout(function(){ if(!won && !locked) bubbleEl.textContent = defaultMsg; }, 1100);
        return;
      }
      if(trapCells[nk]){
        hitTrap(nr, nc, trapCells[nk]);
        return;
      }
      history.push({ r: pos.r, c: pos.c });
      pos = { r: nr, c: nc };
      placeCar(true);
      onEnterSwitch(nk);
      if(nk === warpCellA || nk === warpCellB){
        crossWarp(nk === warpCellA ? warpCellB : warpCellA);
        return;
      }
      beep(520, 0.1, 0, 'triangle', 0.16);
      if(isGoal()){ setTimeout(celebrate, 320); }
    }

    function bump(bx,by){
      carEl.style.setProperty('--bx', bx+'px');
      carEl.style.setProperty('--by', by+'px');
      carEl.classList.remove('bump'); void carEl.offsetWidth; carEl.classList.add('bump');
      if(typeof playRejectSound === 'function') playRejectSound();
    }

    function undo(){
      if(won || locked || !history.length) return;
      ensureAudio();
      pos = history.pop();
      placeCar(true);
      beep(360, 0.1, 0, 'triangle', 0.14);
    }

    function hint(){
      if(won || locked) return;
      ensureAudio();
      // BFS over the solution graph only (edges between pathSet cells - traps
      // are deliberately excluded so the hint never points into an obstacle).
      var startK = key(pos.r,pos.c);
      var goalKey = key(GOAL[0], GOAL[1]);
      var visited = { };
      visited[startK] = null;
      var queue = [startK];
      while(queue.length){
        var cur = queue.shift();
        if(cur === goalKey) break;
        var parts = cur.split(','); var r = +parts[0], c = +parts[1];
        var neighbors = [[r-1,c],[r+1,c],[r,c-1],[r,c+1]];
        for(var i=0;i<neighbors.length;i++){
          var nr = neighbors[i][0], nc = neighbors[i][1];
          if(!inBounds(nr,nc)) continue;
          var nk = key(nr,nc);
          if(pathSet.has(nk) && edgeSet.has(edgeKey(cur,nk)) && !(nk in visited)){
            visited[nk] = cur;
            queue.push(nk);
          }
        }
      }
      if(!(goalKey in visited)) return;
      var step = goalKey;
      while(visited[step] !== startK && visited[step] !== null){ step = visited[step]; }
      var stepParts = step.split(','); var sr = +stepParts[0], sc = +stepParts[1];
      var dr = sr - pos.r, dc = sc - pos.c;
      if(cfg() && cfg().traceControl){
        var targetCell = boardEl.querySelector('[data-r="'+sr+'"][data-c="'+sc+'"]');
        if(targetCell){
          targetCell.classList.remove('hint-glow'); void targetCell.offsetWidth; targetCell.classList.add('hint-glow');
          setTimeout(function(){ targetCell.classList.remove('hint-glow'); }, 1600);
        }
        return;
      }
      var btn = dr < 0 ? upBtn : (dr > 0 ? downBtn : (dc > 0 ? rightBtn : (dc < 0 ? leftBtn : null)));
      if(btn){
        btn.classList.remove('hint-glow'); void btn.offsetWidth; btn.classList.add('hint-glow');
        setTimeout(function(){ btn.classList.remove('hint-glow'); }, 1600);
      }
    }

    upBtn.addEventListener('pointerdown', function(e){ e.stopPropagation(); tryMove(-1,0,0,-8); });
    downBtn.addEventListener('pointerdown', function(e){ e.stopPropagation(); tryMove(1,0,0,8); });
    leftBtn.addEventListener('pointerdown', function(e){ e.stopPropagation(); tryMove(0,-1,-8,0); });
    rightBtn.addEventListener('pointerdown', function(e){ e.stopPropagation(); tryMove(0,1,8,0); });
    undoBtn.addEventListener('pointerdown', function(e){ e.stopPropagation(); undo(); });
    hintBtn.addEventListener('pointerdown', function(e){ e.stopPropagation(); hint(); });

    // Advanced tier: trace the road with a finger/pointer instead of tapping
    // arrows. Each move event checks whether the cell under the pointer is
    // grid-adjacent to the car's current cell and routes it through the same
    // tryMove() rules (gimmicks, traps, warp, goal) that the buttons use.
    var tracing = false;
    function cellFromPoint(clientX, clientY){
      var el = document.elementFromPoint(clientX, clientY);
      var cellEl = el && el.closest ? el.closest('.maze-cell') : null;
      if(!cellEl || cellEl.dataset.r === undefined) return null;
      return { r: +cellEl.dataset.r, c: +cellEl.dataset.c };
    }
    // A fingertip covers roughly one cell's worth of screen, hiding exactly
    // the spot being dragged through. Sampling a bit above the raw touch
    // point (not just visually, but for the actual hit-test) keeps the road
    // ahead of the finger visible instead of hidden underneath it. A mouse
    // cursor doesn't cover anything, so this offset only applies to
    // touch/pen input - applying it to a mouse made every press register as
    // if it landed one cell above the actual cursor, moving "up" no matter
    // where you clicked.
    function fingerYOffset(pointerType){
      if(pointerType === 'mouse') return 0;
      var rect = boardWrapEl.getBoundingClientRect();
      var cellH = rect.height / (GRID_ROWS || 1);
      return Math.max(26, Math.min(60, cellH * 0.65));
    }
    function traceTo(cellPos){
      if(won || locked || !cellPos) return;
      var dr = cellPos.r - pos.r, dc = cellPos.c - pos.c;
      if(dr === 0 && dc === 0) return;
      if(Math.abs(dr) + Math.abs(dc) !== 1) return; // finger jumped more than one cell - ignore
      tryMove(dr, dc, dc*8, dr*8);
    }
    boardWrapEl.addEventListener('dragstart', function(e){ e.preventDefault(); });
    boardWrapEl.addEventListener('pointerdown', function(e){
      if(!cfg() || !cfg().traceControl) return;
      e.stopPropagation();
      e.preventDefault();
      ensureAudio();
      tracing = true;
      traceTo(cellFromPoint(e.clientX, e.clientY - fingerYOffset(e.pointerType)));
    });
    boardWrapEl.addEventListener('pointermove', function(e){
      if(!tracing || !cfg() || !cfg().traceControl) return;
      traceTo(cellFromPoint(e.clientX, e.clientY - fingerYOffset(e.pointerType)));
    });
    ['pointerup','pointercancel','pointerleave'].forEach(function(evt){
      boardWrapEl.addEventListener(evt, function(){ tracing = false; });
    });
    replayBtn.addEventListener('pointerdown', function(e){
      e.stopPropagation();
      if(stageIndex >= cfg().stages.length-1 && won){ stageIndex = 0; }
      startStage();
    });
    nextBtn.addEventListener('pointerdown', function(e){
      e.stopPropagation();
      if(stageIndex < cfg().stages.length-1) stageIndex++;
      startStage();
    });
    document.querySelectorAll('.maze-diff-btn').forEach(function(btn){
      btn.addEventListener('pointerdown', function(e){
        e.stopPropagation();
        startMode(btn.dataset.mode);
      });
    });
    backBtn.addEventListener('pointerdown', function(e){
      e.stopPropagation();
      if(playAreaEl.style.display !== 'none'){
        // mid-game -> back to this game's difficulty select
        clearGimmickTimers();
        diffSelectEl.style.display = '';
        playAreaEl.style.display = 'none';
      } else {
        showScreen('menu');
      }
    });
    resetBtn.addEventListener('pointerdown', function(e){
      e.stopPropagation();
      if(won || locked) return;
      ensureAudio();
      resetToStart();
      beep(360, 0.1, 0, 'triangle', 0.14);
    });

    function startStage(){
      generateMaze();
      pos = { r: START[0], c: START[1] };
      history = [];
      won = false;
      locked = false;
      lightCellEl = null; lightDotEl = null; gateCellEl = null;
      var c = cfg();
      stageBadgeEl.textContent = 'ステージ ' + (stageIndex+1) + ' / ' + c.stages.length + '（' + c.label + '）';
      bubbleEl.textContent = c.traceControl ? 'ゆびで なぞって すすもう！' : 'やじるしで すすもう！';
      winPanelEl.classList.remove('show');
      carEl.classList.remove('win');
      setControlsEnabled(true);
      buildBoard();
      placeCar(false);
      startGimmickTimers();
    }

    // Sizes #mazeBoardWrap to actually fill the space left over once the
    // topbar/title/bubble/controls have taken their share, instead of the old
    // fixed "84vw capped at 360px" box - that left large, unused margins on
    // most screens (worst on the tall advanced grid, which shrank the width
    // cap even further to keep its aspect ratio). Measuring the real
    // in-page layout means the board grows to fill whatever room is
    // actually free, on any screen size.
    // Synchronous on purpose: buildBoard()/placeCar() run right after this
    // (in the same call stack, via startStage()) and need the wrap's FINAL
    // width already applied. An earlier version deferred this to
    // requestAnimationFrame, so buildBoard()'s connectors/fences (which bake
    // in fixed pixel positions measured at call time) got laid out against
    // the stale pre-resize width, then never moved once the real resize
    // landed a frame later - drifting visibly out of sync with the actual
    // (now differently-sized) cells. Reading layout below forces the browser
    // to flush any pending style changes first, so this is safe to call
    // synchronously right after toggling playAreaEl visible.
    function sizeBoardWrap(){
      var c = cfg();
      var bodyRect = playAreaEl.getBoundingClientRect();
      var bodyStyle = getComputedStyle(playAreaEl);
      var gap = parseFloat(bodyStyle.rowGap || bodyStyle.gap) || 0;
      var bubbleH = bubbleEl.getBoundingClientRect().height;
      var controlsH = document.getElementById('mazeControls').getBoundingClientRect().height;
      var availH = bodyRect.height - bubbleH - controlsH - gap * 2;
      var availW = bodyRect.width;
      var cellFromH = availH / c.gridRows;
      var cellFromW = availW / c.gridCols;
      var cellPx = Math.max(20, Math.min(cellFromH, cellFromW));
      boardWrapEl.style.width = Math.round(cellPx * c.gridCols) + 'px';
    }
    window.addEventListener('resize', function(){
      if(!cfg()) return;
      sizeBoardWrap();
      // The board just changed size - connectors/fences (fixed px, baked in
      // at buildBoard() time) and the car (percentages computed relative to
      // the old size) both need to be redone against the new dimensions.
      buildBoard();
      placeCar(false);
    });

    function startMode(mode){
      currentMode = mode;
      var c = cfg();
      GRID_ROWS = c.gridRows; GRID_COLS = c.gridCols;
      boardWrapEl.style.aspectRatio = c.gridCols + ' / ' + c.gridRows;
      stageIndex = 0;
      screenEl.style.backgroundImage = "url('" + c.bgImg + "')";
      carImgEl.src = c.carImg;
      carImgEl.alt = c.carAlt;
      diffSelectEl.style.display = 'none';
      playAreaEl.style.display = '';
      dpadEl.classList.toggle('hidden', !!c.traceControl);
      undoBtn.classList.toggle('hidden', !!c.traceControl);
      resetBtn.hidden = !c.traceControl;
      sizeBoardWrap();
      startStage();
    }

    window.resetMazeGame = function(){
      // entering the maze screen from the menu always starts at the difficulty select
      clearGimmickTimers();
      diffSelectEl.style.display = '';
      playAreaEl.style.display = 'none';
    };
  })();

  /* ===================== init ===================== */
  window.resetCountGame();
})();
</script>
<script>
  if('serviceWorker' in navigator){
    var swRegistration = null;
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('service-worker.js').then(function(reg){
        swRegistration = reg;
        reg.update();
      }).catch(function(err){
        console.warn('service worker registration failed:', err);
      });
    });
    // iOS home-screen apps rarely re-check for updates on their own, so also
    // force a check whenever the app is opened/foregrounded again
    document.addEventListener('visibilitychange', function(){
      if(document.visibilityState === 'visible' && swRegistration){ swRegistration.update(); }
    });
    // when a newly-deployed service worker takes over, reload once so the
    // fresh version is actually shown instead of waiting for a second visit
    var swRefreshed = false;
    navigator.serviceWorker.addEventListener('controllerchange', function(){
      if(swRefreshed) return;
      swRefreshed = true;
      window.location.reload();
    });
  }
</script>
</body>
</html>
